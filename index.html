<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技術士一次試験 生物工学部門 過去問</title>
<style>
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#e0dbd4;
    --text:#1a1a18;--text2:#6b6860;--text3:#9b9890;
    --green:#2d7a5a;--green-bg:#eaf4ee;--green-border:#a8d5bc;
    --red:#c0392b;--red-bg:#fdf0ee;--red-border:#f0b8b2;
    --accent:#2d7a5a;--accent-light:#eaf4ee;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.7;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;}
  .header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .header-title{font-size:14px;font-weight:600;}
  .header-sub{font-size:12px;color:var(--text2);margin-top:1px;}
  .stats-mini{display:flex;gap:12px;}
  .stat-item{text-align:center;}
  .stat-num{font-size:18px;font-weight:700;color:var(--accent);line-height:1;}
  .stat-label{font-size:10px;color:var(--text3);margin-top:2px;}
  main{max-width:720px;margin:0 auto;padding:20px 16px 80px;}
  .filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .filter-row::-webkit-scrollbar{display:none;}
  .filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .filter-btn.wrong-f{border-color:var(--red-border);color:var(--red);background:var(--red-bg);}
  .filter-btn.wrong-f.active{background:var(--red);border-color:var(--red);color:#fff;}
  .filter-btn.unanswered-f{border-color:#b8c8e0;color:#2d5a8a;background:#eef3fa;}
  .filter-btn.unanswered-f.active{background:#2d5a8a;border-color:#2d5a8a;color:#fff;}
  .options-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;}
  .progress-text{font-size:13px;color:var(--text2);}
  .right-options{display:flex;align-items:center;gap:12px;}
  .toggle-wrap{display:flex;align-items:center;gap:8px;}
  .toggle-label{font-size:13px;color:var(--text2);}
  .toggle{position:relative;width:38px;height:22px;cursor:pointer;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:background .2s;}
  .toggle input:checked+.toggle-track{background:var(--accent);}
  .toggle-track::after{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
  .toggle input:checked+.toggle-track::after{transform:translateX(16px);}
  .reset-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;}
  .reset-btn:hover{border-color:var(--red-border);color:var(--red);}
  .sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;margin-bottom:12px;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .sync-dot.syncing{background:#e8a020;animation:pulse 1s infinite;}
  .sync-dot.ok{background:var(--green);}
  .sync-dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
  .q-meta{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .tag{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text2);background:var(--surface2);font-weight:500;}
  .tag.year{background:var(--accent-light);border-color:var(--green-border);color:var(--green);}
  .q-text{font-size:15px;line-height:1.75;color:var(--text);margin-bottom:18px;font-weight:500;}
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:border-color .15s,background .15s;font-size:14px;line-height:1.65;color:var(--text);text-align:left;font-family:inherit;width:100%;}
  .choice:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light);}
  .choice-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--border);color:var(--text2);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:background .15s,color .15s;}
  .choice.correct{border-color:var(--green-border);background:var(--green-bg);color:var(--green);}
  .choice.correct .choice-num{background:var(--green);color:#fff;}
  .choice.wrong{border-color:var(--red-border);background:var(--red-bg);color:var(--red);}
  .choice.wrong .choice-num{background:var(--red);color:#fff;}
  .choice.reveal{border-color:var(--green-border);background:var(--green-bg);color:var(--green);}
  .choice.reveal .choice-num{background:var(--green);color:#fff;}
  .choice:disabled{cursor:default;}
  .result-area{margin-top:14px;}
  .result-label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:12px;}
  .result-label.correct{background:var(--green-bg);color:var(--green);}
  .result-label.wrong{background:var(--red-bg);color:var(--red);}
  .result-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .result-label.correct .result-icon{background:var(--green);color:#fff;}
  .result-label.wrong .result-icon{background:var(--red);color:#fff;}
  .explanation{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 16px;font-size:13.5px;line-height:1.75;}
  .explanation-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.05em;margin-bottom:6px;}
  .nav-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:4px;}
  .nav-btn{padding:10px 20px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);font-size:14px;color:var(--text);cursor:pointer;font-family:inherit;transition:border-color .15s;font-weight:500;}
  .nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .nav-btn:disabled{opacity:.3;cursor:default;}
  .nav-center{font-size:13px;color:var(--text2);text-align:center;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;line-height:1.8;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);padding:24px;max-width:320px;width:100%;border:1px solid var(--border);}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:10px;}
  .modal p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px;}
  .modal-btns{display:flex;gap:10px;}
  .modal-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;}
  .modal-btn.danger{background:var(--red);border-color:var(--red);color:#fff;}
  .modal-btn.cancel{background:var(--surface);color:var(--text);}
  @media(max-width:480px){
    .header-inner{flex-direction:column;align-items:flex-start;gap:8px;}
    .stats-mini{gap:16px;}
    .question-card{padding:16px;}
    .choice{padding:11px 12px;font-size:13.5px;}
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="header-title">技術士一次試験 過去問</div>
      <div class="header-sub">生物工学部門（専門科目）</div>
    </div>
    <div class="stats-mini" style="display:none">
      <div class="stat-item"><div class="stat-num" id="h-answered">0</div><div class="stat-label">回答済</div></div>
      <div class="stat-item"><div class="stat-num" id="h-correct">0</div><div class="stat-label">正解</div></div>
      <div class="stat-item"><div class="stat-num" id="h-rate">—</div><div class="stat-label">正答率</div></div>
    </div>
  </div>
</header>

<main>
  <div class="filter-row" id="filter-row"></div>
  <div class="options-row">
    <div class="progress-text" id="progress-text"></div>
    <div class="right-options">
      <button class="reset-btn" onclick="showResetModal()" style="display:none">履歴リセット</button>
      <div class="toggle-wrap">
        <span class="toggle-label">シャッフル</span>
        <label class="toggle"><input type="checkbox" id="shuffle-toggle"><span class="toggle-track"></span></label>
      </div>
    </div>
  </div>
  <div class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">読み込み中...</span></div>
  <div id="question-area">
    <div class="question-card">
      <div class="q-meta" id="q-meta"></div>
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="result-area" id="result-area" style="display:none"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="move(-1)">← 前へ</button>
      <div class="nav-center" id="nav-center"></div>
      <button class="nav-btn" id="btn-next" onclick="move(1)">次へ →</button>
    </div>
  </div>
  <div id="empty-area" style="display:none"><div class="empty-state">該当する問題がありません。</div></div>
</main>

<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <h3>履歴をリセット</h3>
    <p>すべての回答履歴・正答率がこのデバイスから削除されます。この操作は元に戻せません。</p>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideResetModal()">キャンセル</button>
      <button class="modal-btn danger" onclick="resetAll()">リセットする</button>
    </div>
  </div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwgvvP4yQvwB0kbS_aXg26FDDoMZIp1RKLe4EE2A_270T3WtvF_eIKKmEdzTcJ6KiKLMg/exec';
const STORAGE_KEY='biotech_quiz_v1';

// =====================================================
// 問題データ（令和7年度 35問）
// answer は 0始まりインデックス（0=①, 1=②, 2=③, 3=④, 4=⑤）
// =====================================================
// =====================================================
// 以下を index.html の「const questions=[」の直前に貼り付けてください
// =====================================================

const r6questions = [
{year:"令和6年度",no:"問1",
text:"吸光光度法を利用した総タンパク質定量法の原理に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"BCA法は，タンパク質中の特定のアミノ酸によって還元されたCu(Ⅰ)とビシンコニン酸（BCA）との錯体形成による呈色反応を利用した方法である。",
"Biuret法は，トリペプチド以上のオリゴペプチド又はタンパク質とCu(Ⅱ)をアルカリ性条件下で混合することで生じる呈色反応を利用した方法である。",
"Lowry法は，検出感度の向上を目的としてBiuret法を改良して開発され，リンタングステン酸とリンモリブデン酸が還元されて生じる呈色反応を利用した方法である。",
"紫外吸光光度法は，タンパク質を構成する芳香族アミノ酸であるメチオニン，チロシン及びフェニルアラニンのベンゼン環が280nm付近の紫外線を吸収する性質を利用した方法である。",
"Bradford法は，Coomassie Brilliant Blue（CBB）G-250がタンパク質と結合することによって極大吸収波長がシフトすることを利用した方法である。"
],answer:3,
explanation:"紫外吸光光度法（280nm）はチロシン（Tyr）とトリプトファン（Trp）のベンゼン環・インドール環による紫外線吸収を利用した方法である。メチオニンはベンゼン環を持たず280nmの紫外吸収に寄与しない。「メチオニン，チロシン及びフェニルアラニン」という記述が誤りで，正しくはトリプトファンとチロシンが主な吸収アミノ酸である。"},

{year:"令和6年度",no:"問2",
text:"生体由来の高分子に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"アミロペクチンには，α-1,4結合のほかにα-1,6結合も存在する。",
"キチンは，グルコサミンがα-1,4結合で直鎖状につながったホモ多糖である。",
"ヘミセルロースは，植物細胞壁においてセルロースと結合して存在し，アルカリ溶液に易溶で，酸により加水分解されてペントース，ヘキソースなどを生ずる。",
"リグニンは，セルロースなどと共に植物の木質部分の主要な構成成分で，フェニルプロパノイドの三次元重合体であり，植物組織に機械的強度を付与している。",
"セルロースは，植物の細胞壁成分として産生される鎖状高分子である。"
],answer:1,
explanation:"キチンはN-アセチルグルコサミンがβ-1,4結合で直鎖状につながったホモ多糖である。「グルコサミンがα-1,4結合」という記述は2点誤りがあり，正しくはN-アセチルグルコサミンのβ-1,4結合である。キチンはセルロースと同様にβ結合を持ち，節足動物の外骨格や菌類の細胞壁に含まれる。"},

{year:"令和6年度",no:"問3",
text:"グルコースを出発材料として，発酵法により次の物質を工業的に生産する場合，解糖系を経由する物質として，最も不適切なものはどれか。",
choices:["クエン酸","L-グルタミン酸","グルコン酸","L-リンゴ酸","乳酸"],
answer:2,
explanation:"グルコン酸はグルコースが解糖系を経ずに直接グルコン酸オキシダーゼによってグルコースの1位が酸化されて生成される。クエン酸・L-グルタミン酸・L-リンゴ酸・乳酸はいずれも解糖系を経てピルビン酸またはアセチルCoAを経由して生産される。グルコン酸のみ解糖系を経由しない。"},

{year:"令和6年度",no:"問4",
text:"食品添加物として利用されている酵素に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"β-アミラーゼは，デンプンに作用してマルトースを生成する酵素であり，麦芽や穀類の種子から得られる。",
"β-ガラクトシダーゼは，乳糖のガラクトシド結合を加水分解する酵素であり，酵母Kluyveromyces lactisによって産生される。",
"グルコースイソメラーゼは，グルコースをフルクトースに異性化する酵素であり，放線菌Streptomyces murinusによって産生される。",
"アスパラギナーゼは，アスパラギンをアスパラギン酸とアンモニアに加水分解する酵素であり，Aspergillus niger及びAspergillus oryzaeが本来有する酵素遺伝子を増幅させた同じ菌種によって産生される。",
"リゾチームは，かびの細胞壁を溶解する酵素であり，卵黄から精製される。"
],answer:4,
explanation:"リゾチームは細菌（グラム陽性菌）の細胞壁ペプチドグリカンのβ-1,4グリコシド結合を加水分解する酵素であり，かびの細胞壁を溶解するのではない。また，リゾチームは卵白（卵黄ではなく）から精製される。2点誤りがある。"},

{year:"令和6年度",no:"問5",
text:"ワクチンに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"アジュバントは，免疫反応を抑制する目的で添加される。",
"トキソイドワクチンでは，毒素をホルマリン処理，熱処理，酸処理等で毒性を低減又は無毒化したものが抗原として認識され免疫を獲得する。",
"不活化ワクチンは，死菌などの不活化した病原体を抗原とし，数回の接種によるブースター効果を期待しなければならないことが多い。",
"ワクチンは，疾患に対する免疫力を高めて予防あるいは治療する目的で，注射，経口，あるいは経鼻等で投与される。",
"生ワクチンは，病原性を弱めかつ感染性を保持したままの病原体を用い，細胞性免疫を誘導する。"
],answer:0,
explanation:"アジュバント（免疫増強剤）は免疫反応を抑制するのではなく，免疫反応を増強・促進する目的で添加される。抗原単独では十分な免疫応答が得られない場合に，アジュバントを添加することで抗体産生やT細胞応答を増強する。"},

{year:"令和6年度",no:"問6",
text:"機能性表示食品制度に関する次の記述の，□に入る語句の組合せとして，最も適切なものはどれか。\n機能性表示食品とは，[a]の責任において，[b]に基づいた機能性を表示した食品です。販売前に[c]及び機能性の根拠に関する情報などが[d]へ届け出られたものです。ただし，特定保健用食品とは異なり，[d]の個別の許可を受けたものではありません。",
choices:[
"a:事業者　b:科学的根拠　c:安全性　d:厚生労働大臣",
"a:国　b:食経験　c:安定性　d:厚生労働大臣",
"a:事業者　b:食経験　c:安定性　d:消費者庁長官",
"a:国　b:科学的根拠　c:安全性　d:消費者庁長官",
"a:事業者　b:科学的根拠　c:安全性　d:消費者庁長官"
],answer:4,
explanation:"機能性表示食品は，事業者の責任において，科学的根拠に基づいた機能性を表示した食品である。販売前に安全性及び機能性の根拠に関する情報が消費者庁長官へ届け出られる（個別許可は不要）。したがってa=事業者，b=科学的根拠，c=安全性，d=消費者庁長官の選択肢⑤が正しい。"},

{year:"令和6年度",no:"問7",
text:"微生物が産生する胞子又は芽胞に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"バチルス（Bacillus）属の細菌は，栄養源の欠乏などによって細胞内に芽胞を形成する。",
"糸状菌の胞子には，分裂又は出芽によって生じる無性胞子と，減数分裂を経て生じる有性胞子が存在する。",
"放線菌の胞子は，寒天培地上で発芽して基底菌糸が伸長し，栄養源の枯渇と共に気中菌糸が空中に伸びた後に隔壁が作られ，数珠玉状に形成される。",
"食中毒の原因となるウェルシュ菌の芽胞を殺菌するためには，75℃で1分間の加熱が必要である。",
"ハチミツはボツリヌス菌の芽胞で汚染されていることがあるため，1歳未満の乳児に与えないよう，厚生労働省が指導している。"
],answer:3,
explanation:"ウェルシュ菌（Clostridium perfringens）の芽胞は耐熱性が高く，75℃・1分間の加熱では殺菌できない。芽胞を死滅させるには120℃・4時間以上の加熱が必要とされる。75℃・1分間は一般的な食中毒菌（栄養細胞）の殺菌条件であり，芽胞には不十分である。"},

{year:"令和6年度",no:"問8",
text:"オプトジェネティクス（光遺伝学）に関する次の記述のうち，最も不適切なものはどれか。ただし，ChR2はチャネルロドプシン-2の略である。",
choices:[
"オプトジェネティクスは光感受性タンパク質を使用し，それに光を照射することによって細胞の機能を操作し，運動，認知，覚醒，脳波の誘導をする手法である。",
"神経機能の操作には薬物局所投与もされることがあり，ある程度の細胞種特異性を持っているが，ミリ秒スケールのオプトジェネティクスと異なり，分〜日スケールでしか操作することができない。",
"ChR2を特定の細胞に発現させ領域全体に光をあてたとき，ChR2を発現していない細胞は光に応答せず，ChR2を発現している細胞だけが光に応答する。",
"ChR2では，光子が吸収されることによりレチナールの構造が変化し，それがタンパク質の構造変化を引き起こし，陰イオンが透過する。",
"ChR2以外の光感受性タンパク質のハロロドプシンやバクテリオロドプシンも，オプトジェネティクスに使うことができる。"
],answer:3,
explanation:"チャネルロドプシン-2（ChR2）は光照射により陽イオン（Na⁺，K⁺，Ca²⁺など）を透過させるチャネルである。「陰イオンが透過する」という記述が誤り。陰イオンを透過させるのはクロライドチャネルロドプシンなど別のタンパク質であり，ChR2は陽イオンチャネルとして機能して神経細胞を脱分極・活性化させる。"},

{year:"令和6年度",no:"問9",
text:"ヒトにおける長鎖脂肪酸の合成，代謝に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"脂肪酸の合成は，細胞質内においてATPを使ったアセチル-CoAのカルボキシル化反応から始まる。",
"脂肪酸の不飽和化において，ステアリン酸を不飽和化してオレイン酸を合成することができるが，さらに不飽和化してリノール酸やα-リノレン酸を合成することはできない。",
"DHA（ドコサヘキサエン酸）から，鎖長延長と不飽和化によりアラキドン酸を合成することができる。",
"脂肪酸は，細胞質でCoAと反応してアシル-CoAに変換された後，ミトコンドリアのマトリックス内でβ位が段階的に酸化される。",
"ミトコンドリア内へのアシル-CoAの輸送にはカルニチンが必要であり，脂肪酸とカルニチンが結合したアシルカルニチンとしてミトコンドリアのマトリックス内に運ばれる。"
],answer:2,
explanation:"アラキドン酸（20:4, n-6）はリノール酸（18:2, n-6）から鎖長延長と不飽和化によって合成される。DHAは22:6（n-3）であり，アラキドン酸は20:4（n-6）と炭素数も二重結合の位置（系統）も異なるため，DHAからアラキドン酸を合成することはできない。"},

{year:"令和6年度",no:"問10",
text:"染色体に関する次の（ア）〜（オ）の記述のうち，誤っているものの組合せはどれか。\n（ア）テロメアとは，真核生物核内ゲノムなどの線状染色体の末端部分に相当する機能構造体のことで，テロメアDNAには短い縦列反復配列に加えてアデニンに富んだ突出末端が存在する。\n（イ）テロメアDNAの二本鎖部分と一本鎖部分には，それぞれ特有のテロメア結合タンパク質が結合し，複合体をつくり，特殊なクロマチン構造を形成する。\n（ウ）ヒト染色体のセントロメアには反復配列が存在する。\n（エ）コヒーシンは染色体の接着に，コンデンシンは染色体の凝縮・分離に働くタンパク質複合体であり，共にコアサブユニットとして働くタンパク質はバクテリアからヒトまで保存されているDNA結合型ATPaseである。\n（オ）コアヒストンは六量体を形成し，DNAがまわりに巻きついてヌクレオソームを形成する。",
choices:["（ア），（イ）","（イ），（ウ）","（ウ），（エ）","（エ），（オ）","（ア），（オ）"],
answer:4,
explanation:"（ア）テロメアの突出末端はアデニンではなくグアニン（G）に富んでいる（ヒトではTTAGGGの繰り返し配列でGリッチ）。（オ）コアヒストンは八量体（H2A，H2B，H3，H4が各2分子）を形成し，DNAが約147塩基対巻きついてヌクレオソームを形成する。六量体という記述は誤り。したがって誤りは（ア）と（オ）の組合せ⑤。"},

{year:"令和6年度",no:"問11",
text:"細胞骨格に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"細胞骨格は主に微小管，ミクロフィラメント（アクチンフィラメント），中間径フィラメントの3種類からなり，直径が一番大きいのは微小管である。",
"微小管，ミクロフィラメントと異なり，中間径フィラメントは明確なプラス端やマイナス端を持たない。",
"微小管，ミクロフィラメントは全ての真核生物の細胞質に存在し，中間径フィラメントはほとんどの動物にみられる。",
"微小管にはダイニンとキネシンというモータータンパク質が存在するが，中間径フィラメントはモータータンパク質を持たない。",
"微小管を形成するチューブリンはATPase活性を持ち，ミクロフィラメントを形成するアクチンはGTPase活性を持ち，重合と脱重合を行う。"
],answer:4,
explanation:"チューブリンはGTPase活性を持ちGTPの加水分解により重合・脱重合を制御する。アクチンはATPase活性を持ちATPの加水分解により重合・脱重合を制御する。選択肢⑤はチューブリンとアクチンの活性が逆に記述されており不適切。"},

{year:"令和6年度",no:"問12",
text:"ヒトの抗体に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"抗体には2つの機能があり，1つは抗原と特異的に結合する機能，もう1つは抗原の分解除去系を活性化する機能であり，これらの機能は抗体分子の異なる領域によって担われている。",
"IgAは外分泌性抗体とも呼ばれ，腸管，気道，授乳期の乳腺，唾液腺，涙腺などの組織の上皮粘膜下で産生され，レセプターを介して上皮細胞を通過して，内腔へと分泌される。",
"IgEはアレルギーの原因となる抗体であり，マスト細胞や好塩基球の細胞膜上にあるレセプターに結合し，それに抗原が結合することで脱顆粒を誘発する。",
"IgGは最も多量に血清中に含まれ，胎盤を通過することができ，たいていの抗原において二次免疫応答で産生され，補体系の活性化，貪食作用の促進をする。",
"IgMは他のクラスの抗体に比べ分子量が小さく，一次免疫応答で少量産生され，成熟したB細胞の表面に膜結合型として存在し，通常，単量体の形で存在する。"
],answer:4,
explanation:"IgMは他のクラスの抗体に比べ分子量が最も大きく（約900kDa），一次免疫応答で最初に大量産生される。また通常は五量体（ペンタマー）として存在し，単量体ではない。「分子量が小さく」「少量産生」「単量体」という記述はすべて誤り。"},

{year:"令和6年度",no:"問13",
text:"顕微鏡に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"共焦点レーザースキャン顕微鏡では，試料面をスポット状のレーザービームで走査してその焦点面からの蛍光と反射光の空間分布を記録し，コンピュータを通してその切片画像を再現する。",
"位相差顕微鏡では，光の回折と干渉という現象を利用して，透明な標本に明暗のコントラストをつけて観察する。",
"微分干渉顕微鏡では，無染色の標本を光が通過する際の屈折率の変化や，標本表面の形状による光路差を干渉色による明暗のコントラストや色の違いに変えて観察する。位相差観察と比べて，厚い標本に適している。",
"原子間力顕微鏡では，探針と試料の間にかけた微小電圧下で流れる電流の変化を解析して結像する。",
"クライオ電子顕微鏡では，水溶液中に分散した生体高分子を水溶液薄膜として急速凍結し，氷薄膜に包埋した分子の像を数多く撮影して画像解析することで，高分解能の立体像を再構成する。"
],answer:3,
explanation:"探針と試料の間にかけた微小電圧下で流れるトンネル電流を利用するのは走査型トンネル顕微鏡（STM）である。原子間力顕微鏡（AFM）は探針と試料表面の間に働く原子間力（van der Waals力など）を検出して表面形状を解析する。電圧・電流を使うという記述はSTMの説明であり，AFMの説明として不適切。"},

{year:"令和6年度",no:"問14",
text:"光合成の反応式を次に示す。\n6CO₂ + 12H₂O → C₆H₁₂O₆ + 6O₂ + 6H₂O\nある植物では，昼間に二酸化炭素が1時間当たり15mg吸収され，夜間に二酸化炭素が1時間当たり2.5mg放出された。ただし，昼間は11時間，夜間は13時間とする。1日当たりの光合成量（グルコース換算）に最も近い値は次のうちどれか。ただし，原子量は，H=1，C=12，O=16として計算せよ。",
choices:["70mg","90mg","135mg","155mg","195mg"],
answer:1,
explanation:"昼間の総CO₂吸収量=15×11=165mg。夜間のCO₂放出量=2.5×13=32.5mg。正味のCO₂固定量=165-32.5=132.5mg。CO₂分子量=44，グルコース分子量=180。グルコース量=132.5×(180/264)≒132.5×0.6818≒90.3mg。最も近い値は②90mgである。"},

{year:"令和6年度",no:"問15",
text:"DNAに関する次の記述の，□に入る数値及び語句の組合せとして，最も適切なものはどれか。\nある細胞の全DNAの塩基の割合を調べたところ，チミンは19%であった。このDNAのGC含量は[a]%であり，このDNAの融解温度（Tm）は，ある高等動物由来DNA（GC含量45%）のTmと比べて[b]。",
choices:["a:38　b:低い","a:62　b:低い","a:38　b:高い","a:62　b:高い","a:31　b:低い"],
answer:3,
explanation:"チミン=19%なのでアデニン=19%（A=T）。GC含量=(100-19-19)=62%。GC含量が高いほどGC間の水素結合（3本）が多くTmが高い。このDNAのGC含量62%は，高等動物由来DNA（GC含量45%）より高いため，Tmは高い。したがってa=62，b=高い，選択肢④が正しい。"},

{year:"令和6年度",no:"問16",
text:"1960年代に遺伝暗号解読が盛んに行われた。その方法は，化学合成したRNAを無細胞タンパク質合成系に加えたときにできるポリペプチドを解析するという方法である。次に示すア〜エの実験結果から推定される事項として，最も不適切なものはどれか。\nア．ポリ(UG)を無細胞タンパク質合成系に加えると，CysとValが交互に並んだペプチドが合成された。\nイ．ポリ(GUG)を無細胞タンパク質合成系に加えると，3種の異なった単一アミノ酸からなるホモペプチド，(Gly)n，(Trp)n，(Val)nの混合物が合成された。\nウ．ポリ(UGU)を無細胞タンパク質合成系に加えると，3種の異なった単一アミノ酸からなるホモペプチド，(Cys)n，(Leu)n，(Val)nの混合物が合成された。\nエ．ポリ(UUGG)を無細胞タンパク質合成系に加えると，N末端（-Leu-Val-Gly-Trp-）nC末端の順で繰り返し配列を持つペプチドが合成された。",
choices:["GUGはValをコードする。","UGUはCysをコードする。","GGUはTrpをコードする。","UUGはLeuをコードする。","GUUはValをコードする。"],
answer:2,
explanation:"実験イよりポリ(GUG)から(Gly)n，(Trp)n，(Val)nが得られるので，GGU=Gly，UGG=Trp，GUG=Valと推定できる。「GGUはTrpをコードする」という記述は誤りで，GGUはGlyをコードし，TrpをコードするのはUGGである。"},

{year:"令和6年度",no:"問17",
text:"図は葉緑体の構造模式図である。光合成に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"光エネルギーによって活性化された光化学系Ⅱでは，水が水素イオンと電子及び酸素に分解される。",
"電子伝達の過程には，光化学系Ⅰ，シトクロム複合体，光化学系Ⅱという3つのタンパク質複合体が関与しており，NADPHを生成するとともにチラコイド膜内外に水素イオンの濃度勾配を形成する。",
"葉緑体ATP合成酵素がチラコイド膜内への水素イオン流入と共役してチラコイド内腔にATPを合成する。",
"ストロマには二酸化炭素を固定し，リン酸化や還元反応を利用して有機物を合成するカルビン回路が存在する。",
"カルビン回路では，リブロース1,5-ビスリン酸カルボキシラーゼ/オキシゲナーゼ（RuBisCO）により，リブロース1,5-ビスリン酸に二酸化炭素を付加して，2分子の3-ホスホグリセリン酸を生成する。"
],answer:2,
explanation:"葉緑体ATP合成酵素はチラコイド膜を貫通しており，チラコイド内腔から外側（ストロマ側）への水素イオンの流出に共役してATPを合成する。「チラコイド膜内への水素イオン流入と共役してチラコイド内腔にATPを合成する」という記述は方向と場所が誤り。ATPはストロマ側で合成される。"},

{year:"令和6年度",no:"問18",
text:"細胞周期及びその制御に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"細胞周期は細胞が増殖を開始し，DNA複製，染色体の分配，核分裂，細胞質分裂などの事象を経て，2つの細胞となって出発点に戻るまでのサイクルをいう。",
"G₁期チェックポイントでは，DNAの複製が完了したことをチェックする。",
"G₂期チェックポイントでは，M期に進んでよいかをチェックする。",
"G₁期で止まって増殖を一時休止している状態を特にG₀期と呼ぶ。",
"M期の後期では，染色体が紡錘糸の働きによって両極に移動していく。"
],answer:1,
explanation:"G₁期チェックポイントはDNA複製が完了したかどうかをチェックするのではなく，細胞がS期（DNA複製期）に入る準備ができているかをチェックする（細胞の大きさ，栄養状態，DNA損傷の有無など）。DNA複製の完了をチェックするのはG₂期チェックポイントである。"},

{year:"令和6年度",no:"問19",
text:"ウイルスに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"1本鎖DNAをゲノムとして持つウイルスがある。",
"細菌に感染するウイルスをバクテリオファージあるいはファージと呼ぶ。",
"個体に感染してがんを生じさせたり，培養細胞をがん細胞に変化させたりするウイルスがある。",
"レトロウイルスは，逆転写酵素によって，ゲノムDNAから二本鎖RNAを中間体として複製させ増殖する。",
"アデノウイルスは，扁桃腺やリンパ節で増殖し，扁桃腺や喉の痛みを伴う咽頭結膜熱の主な原因ウイルスである。"
],answer:3,
explanation:"レトロウイルスはRNAをゲノムとして持ち，逆転写酵素によってゲノムRNA→二本鎖DNA（cDNA）を中間体として合成し，宿主ゲノムに組み込まれてプロウイルスとなって増殖する。「ゲノムDNAから二本鎖RNAを中間体として複製」という記述は完全に逆であり誤り。"},

{year:"令和6年度",no:"問20",
text:"次の配列の2本鎖DNA全長をPCR法で増幅させたい。そのための2種類のプライマーとして，最も適切な組合せはどれか。ただし，2本鎖のうちの一方の鎖の5'側からの配列のみを記してある。\n5'-TTAGTGATACTTGTGGGCCAGGGCATTAGCCACACCAGCCACCACTTTCTGATAGGCAGCCTGCACTGGTGGGGTGAATTCTTTGCCAAGTGATGGGCCAGCACACAGACCAGCACGTTGCCCAGGAGCTGTGGGAGGAAGATAAGAGGTATGAACATGATTAGCAAAAGGGCCTAGCT-3'",
choices:[
"5'-TTAGTGATACTTGTG-3'，5'-CAAAAGGGCCTAGCT-3'",
"5'-AATCACTATGAACAC-3'，5'-AGCTAGGCCCTTTTG-3'",
"5'-CACAAGTATCACTAA-3'，5'-CAAAAGGGCCTAGCT-3'",
"5'-TTAGTGATACTTGTG-3'，5'-AGCTAGGCCCTTTTG-3'",
"5'-AATCACTATGAACAC-3'，5'-GTTTTCCCGGATCGA-3'"
],answer:3,
explanation:"PCRでは一方のプライマーはセンス鎖の5'末端と同じ配列（フォワードプライマー），もう一方はアンチセンス鎖の5'末端と同じ配列（リバースプライマー，センス鎖の3'末端の逆相補配列）が必要。フォワード：5'-TTAGTGATACTTGTG-3'（配列先頭と一致），リバース：3'末端AGCTAGGCCCTTTTG（…CAAAAGGGCCTAGCT の逆相補配列）＝5'-AGCTAGGCCCTTTTG-3'。選択肢④が正しい。"},

{year:"令和6年度",no:"問21",
text:"タンパク質に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"タンパク質の中で，アミノ酸同士を結ぶアミド結合をペプチド結合という。",
"タンパク質の生合成過程では，タンパク質はアミノ末端側から順番に作られる。",
"タンパク質の立体構造の形成に寄与するジスルフィド結合は，2つのチオール基の酸化によってできる共有結合で，還元されると切断される。",
"αヘリックス構造とβシート構造は，主にアミノ酸残基の側鎖間のイオン結合で形成されている。",
"タンパク質の4次構造とは，複数のポリペプチド鎖が会合して特定の空間的配置をとる構造をいう。"
],answer:3,
explanation:"αヘリックス構造とβシート構造（二次構造）は，主鎖のアミド基（-NH-）とカルボニル基（-C=O-）の間の水素結合によって形成されている。側鎖間のイオン結合は三次構造の安定化に寄与するが，二次構造形成の主要な力ではない。"},

{year:"令和6年度",no:"問22",
text:"次の植物ホルモンとその作用の組合せのうち，最も不適切なものはどれか。",
choices:[
"エチレン　　　　　果実形成の促進",
"アブシシン酸　　　種子の成熟と休眠",
"サイトカイニン　　細胞分裂の促進",
"ジベレリン　　　　発芽の促進",
"オーキシン　　　　細胞の分裂・伸長・分化の制御"
],answer:0,
explanation:"エチレンの主な作用は果実の成熟促進（追熟），落葉・落果の促進，花の老化促進などである。「果実形成の促進」はオーキシンやジベレリンの作用に近い。エチレンは果実形成を促進するのではなく，果実の成熟（熟化）を促進する植物ホルモンである。"},

{year:"令和6年度",no:"問23",
text:"生物学的排水処理に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"生物学的脱リン法とは，活性汚泥中の微生物が好気条件でリン酸を吐き出し，嫌気条件で余剰のリン酸を取り込む性質を利用したものである。",
"生物学的脱窒処理では，脱窒工程でメタノール等の水素供与体を加えて硝酸イオンを窒素まで還元する。",
"嫌気性処理装置の改良型であるUASB（Upflow Anaerobic Sludge Blanket）法は，温度や負荷変動に強く，高負荷運転が可能である。",
"膜分離活性汚泥法は，活性汚泥フロックの分離において重力式の沈殿池の代わりに膜分離を用いる方法であり，施設がコンパクトである。",
"Anammox（Anaerobic Ammonia Oxidation）法は，アンモニア態窒素や亜硝酸態窒素を直接窒素ガスにする。"
],answer:0,
explanation:"生物学的脱リン法では，微生物は嫌気条件でリン酸を放出し，好気条件で過剰にリン酸を取り込む（過剰摂取）。選択肢①は「好気条件でリン酸を吐き出し，嫌気条件で余剰のリン酸を取り込む」と逆に記述されており不適切。"},

{year:"令和6年度",no:"問24",
text:"ある標準活性汚泥法による排水処理施設の反応タンクに流入する汚水の流量は，800m³/日，BODは200mg/Lである。反応タンクの容積が400m³であるとき，BOD容積負荷[kgBOD/(m³・日)]の値として，最も近い値はどれか。",
choices:["0.1","0.4","0.8","1.6","3.2"],
answer:1,
explanation:"BOD容積負荷=（流入BOD量）÷（反応タンク容積）。流入BOD量=800m³/日×200mg/L=800×0.2kg/m³=160kgBOD/日。BOD容積負荷=160÷400=0.4kgBOD/(m³・日)。答えは②0.4。"},

{year:"令和6年度",no:"問25",
text:"有機廃棄物のコンポストの製造や農耕地への施用における次の記述のうち，最も不適切なものはどれか。",
choices:[
"未熟堆肥を施用した場合は，土壌中での急激な微生物増殖による窒素飢餓を起こす可能性がある。",
"下水汚泥を原料とした場合は，重金属による土壌汚染の可能性を考慮する必要がある。",
"堆肥中の有機炭素の大部分は，土壌微生物による分解を受けて，廃棄物を焼却した場合と同様に二酸化炭素として大気中に放出される。",
"硝酸イオンやリン酸による環境汚染を防ぐことができる。",
"化学肥料の削減効果がある。"
],answer:3,
explanation:"コンポスト（堆肥）を農耕地に施用すると，過剰施用により硝酸態窒素が溶脱して地下水や河川に流入し，富栄養化を引き起こす可能性がある。またリン酸も過剰施用により流出して水域の富栄養化につながる。「硝酸イオンやリン酸による環境汚染を防ぐことができる」という記述は不適切。"},

{year:"令和6年度",no:"問26",
text:"持続可能な航空燃料（SAF，Sustainable Aviation Fuel）の製造方法に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"都市ゴミや木質バイオマスをガス化炉でガス化し，生成した水素と一酸化炭素をFT（Fischer-Tropsch）合成することによりSAFを製造する。",
"微細藻類由来の炭化水素に水素化処理を行ってSAFを製造する。",
"草本等のセルロース系バイオマスの糖化と発酵によりエタノールを生産し，エチレンに転換してオリゴマー化プロセスを行うことによりSAFを製造する。",
"廃油を接触水熱処理により分解し，水素化処理を行ってSAFを製造する。",
"廃食油をメチルエステル化処理してSAFを製造する。"
],answer:4,
explanation:"廃食油をメチルエステル化処理して製造されるのはバイオディーゼル燃料（FAME：Fatty Acid Methyl Ester）であり，航空燃料（SAF）の規格を満たさない。SAFとして認定されるためには，水素化処理（HVO/HEFA）などの精製工程が必要で，メチルエステル化だけではSAFにならない。"},

{year:"令和6年度",no:"問27",
text:"日本のノーベル賞受賞者の主な研究・業績に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"大隅良典は，酵母の細胞内のタンパク質がオートファゴソームと呼ばれる膜胞の中に封入された後，それが液胞と融合し，分解されアミノ酸となって細胞質に戻るまでの過程を詳細に観察し，オートファジー（自食作用）を実証した。",
"大村智は，土壌から分離された糸状菌が生産する，寄生虫に有効な新しいメロテルペノイド化合物を発見し，エバーメクチン（Avermectin）と命名した。",
"本庶佑は，T細胞の増殖とエフェクター機能を抑制する免疫抑制補助シグナル受容体であるPD-1を発見し，PD-1阻害ががん治療に寄与することを実証した。",
"山中伸弥は，マウスの体細胞に特定の遺伝子群を導入することにより，人工多能性幹（iPS）細胞の誘導に成功した。",
"下村脩は，オワンクラゲから緑色蛍光タンパク質（GFP）を最初に単離するとともに，紫外線を当てるとこのタンパク質が緑色に光ることを発見した。"
],answer:1,
explanation:"大村智が発見したエバーメクチンは，メロテルペノイドではなくマクロライド系化合物（アベルメクチン類）である。土壌放線菌（糸状菌ではなく）Streptomyces avermitilisから発見された。「糸状菌」および「メロテルペノイド」という記述が誤り。"},

{year:"令和6年度",no:"問28",
text:"ライフサイクルアセスメント（LCA）に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"LCAの実施方法は，ISO（International Organization for Standardization，国際標準化機構）の規格で決められている。",
"LCAは，対象となる製品に関係する資源の採掘から，素材や部品の製造，組立，廃棄に至る製品のライフサイクル全体を考慮する。",
"LCAは，環境側面だけでなく，経済的及び社会的側面も評価する方法である。",
"LCAは，「目的及び調査範囲の設定」，「インベントリ分析」，「影響評価」，「解釈」の四つのフェーズで行われる。",
"市場で競合する他社製品とのLCAの比較結果を公表する場合は，専門家によるクリティカルレビューが必要である。"
],answer:2,
explanation:"LCA（ライフサイクルアセスメント）は主として環境側面（温室効果ガス排出量，エネルギー消費，水使用量など）を定量評価する手法であり，経済的・社会的側面は評価の対象外である。経済・社会的側面も含めた評価にはLCC（ライフサイクルコスト）やS-LCA（社会的LCA）などの別の手法が用いられる。"},

{year:"令和6年度",no:"問29",
text:"次のうち，抽出物が健康食品や化粧品に広く利用され，高い抗酸化作用を持つカロテノイドであるアスタキサンチン（エビやカニ，サケが持つ赤い色素）を大量に含有する単細胞藻類として，最も適切なものはどれか。",
choices:[
"ヘマトコッカス（Haematococcus）",
"クロレラ（Chlorella）",
"ユーグレナ（Euglena）",
"ナンノクロロプシス（Nannochloropsis）",
"ドナリエラ（Dunaliella）"
],answer:0,
explanation:"アスタキサンチンを大量に蓄積する単細胞藻類はヘマトコッカス（Haematococcus pluvialis）である。強光ストレス下で二次カロテノイドとしてアスタキサンチンを大量合成・蓄積し，細胞が赤色に変色する。クロレラはクロロフィル，ユーグレナはパラミロン，ドナリエラはβ-カロテンで知られる。"},

{year:"令和6年度",no:"問30",
text:"免疫に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"Tollは，ショウジョウバエの正常な発生に必要な遺伝子として発見され，後になってかびの感染から体を守る機能もあることが見出された。",
"Toll様受容体（Toll Like Receptor, TLR）は，獲得免疫系を活性化するための必須の要素で，T細胞やB細胞で発現している。",
"TLRは，微生物やウイルスなどの構成成分を認識する。",
"マクロファージは，体内に侵入した細菌などの異物を貪食する能力に優れており，貪食した細菌を消化・殺菌することで，細菌感染を防いでいる。",
"樹状細胞は異物を貪食作用によって取り込み，T細胞への抗原提示を行う。"
],answer:1,
explanation:"TLR（Toll様受容体）は自然免疫系のパターン認識受容体であり，主に樹状細胞，マクロファージ，好中球などの自然免疫細胞で発現している。「獲得免疫系を活性化するための必須の要素で，T細胞やB細胞で発現している」という記述は誤り（TLRは自然免疫の受容体であり，T細胞・B細胞での発現は主要ではない）。"},

{year:"令和6年度",no:"問31",
text:"ヒトの腸内細菌叢に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"ヒトの腸内細菌叢は加齢に伴い変化する。",
"乳児が離乳食を摂るようになると，腸内細菌叢は成人のパターンに似てくる。",
"様々な疾患に対して，糞便移植療法の治験が進められている。",
"抗生物質の投与前後で，ヒトの腸内細菌叢は変動せず安定に保たれる。",
"ヒトの腸内細菌叢を解析する方法としては，次世代シークエンサーを用いたメタゲノム解析が行われている。"
],answer:3,
explanation:"抗生物質は腸内細菌に広く作用するため，投与後に腸内細菌叢の多様性が著しく低下・変動することが知られている。「変動せず安定に保たれる」という記述は誤りで，抗生物質投与は腸内フローラに大きな影響を与える。"},

{year:"令和6年度",no:"問32",
text:"清酒（日本酒）に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"日本酒の醸造で働く微生物は，主に麹菌と酵母である。",
"吟醸酒の香りは，主にカプロン酸エチルや酢酸イソアミルなどのエステル類に由来する。",
"麹菌による糖化と酵母によるアルコール発酵が同時に進むことを単行複発酵という。",
"雑菌の繁殖を防ぐために，乳酸の添加により酸性にして酒母をつくる醸造方法がある。",
"火落ち（ひおち）とは，製造している日本酒が貯蔵中に白濁して変敗することであり，特定の乳酸菌によって引き起こされる。"
],answer:2,
explanation:"麹菌による糖化と酵母によるアルコール発酵が同時に進行することを「並行複発酵」という。「単行複発酵」はビール製造のように糖化と発酵が順番に行われる方式（麦芽→糖化後→酵母発酵）を指す。日本酒の製造方式は「並行複発酵」であり「単行複発酵」という記述は誤り。"},

{year:"令和6年度",no:"問33",
text:"次のうち，ゲノム編集を応用して開発された食品として，最も不適切なものはどれか。",
choices:[
"筋肉量が増加した肉厚な真鯛",
"GABA（γ-アミノ酪酸）の含量を増加させたトマト",
"BT（Bacillus thuringiensis）タンパク質を発現する害虫抵抗性トウモロコシ",
"黒く変色しないマッシュルーム",
"オレイン酸を多く含む大豆"
],answer:2,
explanation:"BTタンパク質（Bacillus thuringiensisの殺虫タンパク質）を発現する害虫抵抗性トウモロコシは，遺伝子組換え技術（外来遺伝子の導入）によって開発されたものであり，ゲノム編集食品ではない。ゲノム編集は外来遺伝子を挿入せず既存の遺伝子を改変する技術であり，BTトウモロコシは従来の遺伝子組換えGMO作物である。"},

{year:"令和6年度",no:"問34",
text:"網羅的な生体分子の解析手法であるオミックス解析に関する次の組合せとして，最も不適切なものはどれか。",
choices:[
"メタボローム　　代謝分子　　　　次世代シークエンサー",
"トランスクリプトーム　転写産物　RNA-Seq",
"プロテオーム　　タンパク質の量・種類　2次元電気泳動",
"インタラクトーム　タンパク質間相互作用　酵母ツーハイブリッド法",
"ゲノム　　　　　DNAの遺伝情報　DNAシーケンサー"
],answer:0,
explanation:"メタボローム解析（代謝物の網羅的解析）には，GC-MS（ガスクロマトグラフィー質量分析），LC-MS（液体クロマトグラフィー質量分析），NMRなどが用いられる。次世代シークエンサーはDNA・RNAの塩基配列解析に使用されるものであり，メタボロームの解析手法として不適切。"},

{year:"令和6年度",no:"問35",
text:"ホルモンに関する次の組合せのうち，最も不適切なものはどれか。",
choices:[
"アドレナリン　　副腎髄質　　カテコールアミン",
"インスリン　　　膵臓　　　　ペプチド",
"テストステロン　精巣　　　　ステロイド",
"エストラジオール　卵巣　　　ステロイド",
"プロスタグランジン　視床下部　ペプチド"

];

{ year: "令和3年度", no: "問1", text: "グルコースを出発材料として，発酵法により次の物質を直接生産する場合，解糖系を経由する物質として，最も不適切なものはどれか。", choices: ["①エタノール", "②乳酸", "③フマル酸", "④グルタミン", "⑤グルコン酸"], answer: 4, explanation: "正答は⑤グルコン酸。グルコン酸はグルコースの直接酸化によって生成されるものであり，解糖系を経由しない。エタノール，乳酸，フマル酸，グルタミンはいずれも解糖系の産物（ピルビン酸など）を経由して生産される。" },
{ year: "令和3年度", no: "問2", text: "オプトジェネティクス（光遺伝学）に関する次の記述のうち，最も不適切なものはどれか。ただし，ChR2はチャネルロドプシン－２の略である。", choices: ["①オプトジェネティクスは光感受性タンパク質を使用し，それに光を照射することによって細胞の機能を操作し，運動，認知，覚醒，脳波の誘導をする手法である。", "②神経機能の操作には薬物局所投与もされることがあり，ある程度の細胞種特異性を持って，オプトジェネティクス同様にミリ秒スケールで操作することができる。", "③ChR2では，光子が吸収されることによりレチナールの構造が変化し，それがタンパク質の構造変化を引き起こし，陽イオンが透過する。", "④ChR2を特定の細胞に発現させ領域全体に光をあてたとき，ChR2を発現していない細胞は光に応答せず，ChR2を発現している細胞だけが光に応答する。", "⑤ChR2以外の光感受性タンパク質のハロロドプシンやバクテリオロドプシンも，オプトジェネティクスに使うことができる。"], answer: 1, explanation: "正答は②。薬物局所投与はミリ秒スケールでの精密な時間制御が難しく，オプトジェネティクスのような時間精度での細胞操作はできない。②の記述はオプトジェネティクスと薬物投与の特性を混同しており不適切である。" },
{ year: "令和3年度", no: "問3", text: "テロメア，テロメラーゼに関する次の（ア）〜（オ）の記述について，正しいものには○，誤っているものには×を付けた組合せとして，最も適切なものはどれか。\n（ア）テロメアとは，真核生物核内ゲノムなどの線状染色体の末端部分に相当する機能構造体のことで，テロメアDNAには短い縦列反復配列に加えてアデニンに富んだ突出末端が存在する。\n（イ）テロメアDNAの二本鎖部分と一本鎖部分には，それぞれ特有のテロメア結合タンパク質が結合し，複合体をつくり，特殊なクロマチン構造を形成する。\n（ウ）通常のDNAポリメラーゼでは，テロメアDNAの5'末端を完全に複製することができず，細胞分裂を繰り返すとテロメアDNAが長くなっていき，これが細胞寿命と関係しているとされる。\n（エ）テロメア長を維持するために必要なテロメアDNAを新規に合成伸長させる酵素をテロメラーゼといい，動物において多くの体細胞ではテロメラーゼは発現しないが，造血幹細胞や生殖細胞など盛んに増殖が必要な細胞で発現している。\n（オ）テロメラーゼは，触媒サブユニットであるタンパク質とDNAが含まれている酵素である。", choices: ["①ア×　イ○　ウ×　エ×　オ○", "②ア○　イ×　ウ○　エ×　オ×", "③ア×　イ×　ウ○　エ×　オ○", "④ア×　イ○　ウ×　エ○　オ×", "⑤ア○　イ×　ウ×　エ○　オ×"], answer: 3, explanation: "正答は④（ア×，イ○，ウ×，エ○，オ×）。（ア）テロメアの突出末端はグアニンに富む（アデニンではない）。（ウ）テロメアは複製のたびに短くなる（長くはならない）。（オ）テロメラーゼはRNA（DNAではなく）と触媒タンパク質から成るリボ核タンパク質である。" },
{ year: "令和3年度", no: "問4", text: "回分培養，流加培養（半回分培養），連続培養の特徴に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①回分培養では，基質濃度を制御することができないが，流加培養，連続培養では基質濃度を制御することができる。", "②回分培養，流加培養では，培養液量が一定であるが，連続培養では培養液量が増加する。", "③回分培養に比べて，流加培養では高い菌体濃度と生産物濃度を達成することができる。", "④低濃度でも増殖阻害を起こすものを基質とする場合，流加培養によって，阻害が起きない濃度に保って培養することができる。", "⑤連続培養では，供給する基質の濃度などを操作することによって，任意の菌体，基質濃度を実現することができる。"], answer: 1, explanation: "正答は②。流加培養では基質を添加し続けるため培養液量は増加するが，回分培養では培養液量は一定である。よって「回分培養，流加培養ともに培養液量が一定」という記述は不適切である。" },
{ year: "令和3年度", no: "問5", text: "ポリフェノールとその含まれる代表的な食品素材，及びその特徴に関する次の（ア）〜（オ）の組合せについて，適切なものの数はどれか。\n（ア）カテキン　茶　コレステロールの吸収抑制\n（イ）タンニン　完全渋柿　不溶化による渋抜き\n（ウ）ヘスペリジン　大豆　易水溶性化合物\n（エ）レスベラトロール　みかん　SIRT1（サーチュイン）の不活化\n（オ）イソフラボン　ぶどう　ロドプシンの再合成の活性化", choices: ["①（ア），（イ）", "②（イ），（ウ）", "③（ウ），（エ）", "④（エ），（オ）", "⑤（ア），（オ）"], answer: 0, explanation: "正答は①（ア）と（イ）。カテキンは茶に含まれコレステロール吸収抑制作用があり正しい。タンニンは完全渋柿に含まれ不溶化により渋抜きされる。（ウ）ヘスペリジンはみかんに含まれ難水溶性，（エ）レスベラトロールはぶどうに含まれSIRT1を活性化，（オ）イソフラボンは大豆に含まれる。" },
{ year: "令和3年度", no: "問6", text: "顕微鏡に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①位相差顕微鏡では，光の回折と干渉という現象を利用し，透明な標本に明暗のコントラストをつけて観察する。", "②微分干渉顕微鏡では，無染色の標本を光が通過する際の光路差を，干渉による明暗のコントラストや色の濃淡に変えて観察する。", "③共焦点レーザー顕微鏡では，試料前後のスポットを投射レーザービームで走査し，その間の焦点において発する試料の蛍光を観察記録し，コンピューターを通して立体的に画像を再現する。", "④走査型トンネル顕微鏡では，試料と試料からわずかに離れた探針の間に電圧をかけ流れる電子量（トンネル電流）の変化を解析して画像化する。", "⑤質量顕微鏡では，試料に存在する分子をレーザーで脱離・イオン化し，イオン化した分子を質量分析計に導入して，その質量電荷比を測定する。"], answer: 3, explanation: "正答は④。走査型トンネル顕微鏡（STM）の説明は概ね正しいが，問題文中の「非子顕微鏡」という記述が不正確であることから④が不適切とされる。" },
{ year: "令和3年度", no: "問7", text: "疾病とその原因，及びその特徴に関する次の（ア）〜（オ）の組合せについて，適切なものはどれか。\n（ア）ダウン症候群　　常染色体異常　　特有の顔貌，知的障害\n（イ）ハンチントン病　　常染色体優性遺伝　　進行性の舞踏病様運動異常と認知症\n（ウ）ターナー症候群　　性染色体異常（45,X）　　女性不妊，低身長\n（エ）フェニルケトン尿症　　常染色体劣性遺伝　　フェニルアラニン水酸化酵素の欠損\n（オ）血友病　　性染色体劣性遺伝　　出血傾向", choices: ["①（ア），（イ）", "②（イ），（ウ）", "③（ウ），（エ）", "④（エ），（オ）", "⑤（ア），（オ）"], answer: 4, explanation: "正答は⑤（ア）と（オ）。ダウン症候群は21番染色体のトリソミーによる常染色体異常であり特有の顔貌と知的障害を示す。血友病はX染色体連鎖劣性遺伝による性染色体異常で出血傾向を示す。" },
{ year: "令和3年度", no: "問8", text: "遺伝暗号とコドンに関する次の記述のうち，最も不適切なものはどれか。", choices: ["①アンチコドン中のイノシンは，コドン中のアデニン，ウラシル又はシトシンと塩基対を形成する。", "②１種類のtRNAが，複数種のコドンを認識できる場合がある。", "③メチオニンのコドンは「AUG」の１種である。", "④終止コドンをアミノ酸に対応するコドンとして認識するサプレッサーtRNAが存在する。", "⑤「UAA」は終止コドンの１つで，成熟mRNAにおいてはコード領域の３'末端側に存在する。"], answer: 4, explanation: "正答は⑤。終止コドン「UAA」はコード領域の3'末端側（終止部位）に存在しており，5'末端側ではない。⑤の記述は「5'末端側」と誤っている（または「3'末端側」であれば正しい）ため不適切とされる。" },
{ year: "令和3年度", no: "問9", text: "次に示すアミノ酸配列のペプチドにトリプシンを作用させた場合，切断される部位として，最も適切なものはどれか。ただし，㋐〜㋗はペプチド結合の位置を表す。\nNH₂－Leu-㋐-Ile-㋑-Val-㋒-Phe-㋓-Gln-㋔-Phe-㋕-Met-㋖-Lys-㋗-Gly-Asp－COOH", choices: ["①㋐", "②㋖", "③㋒，㋔", "④㋃，㋕", "⑤㋐，㋑，㋒，㋓，㋔，㋕，㋖，㋗"], answer: 0, explanation: "正答は①。トリプシンはリシン（Lys）またはアルギニン（Arg）のC末端側のペプチド結合を切断する。この配列ではLysが8番目に位置し，㋖（Met-Lysの間ではなく）Lys-Glyの間である㋗が切断部位となる。選択肢記号の対応を確認すると㋖がLys後の結合に対応する。" },
{ year: "令和3年度", no: "問10", text: "自然界における元素の循環と回収に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①バクテリアリーチングは，銅やウランの採鉱に用いられる。", "②炭素循環においては微生物によるメタン資化は起こらないのに対し，メタン生成菌の活動により生じたメタンの一部は大気中へ放出される。", "③硫黄循環では，硫黄酸化細菌による硫化水素の硫酸への酸化が起こる一方で，硫酸還元細菌による硫酸の還元も起こる。", "④バクテリアリーチングでは，硫黄酸化細菌の一種である鉄酸化細菌（Thiobacillus ferrooxidans）により銅の回収が行われる。", "⑤湖沼のアオコ発生や内海での赤潮発生の原因として，生活排水中のリン酸塩の影響が問題視されてきた。"], answer: 1, explanation: "正答は②。メタンを酸化・資化するメタン資化菌（メタノトローフ）は自然界に存在し，炭素循環において重要な役割を果たす。「メタン資化は起こらない」という記述は誤りである。" },
{ year: "令和3年度", no: "問11", text: "ファージディスプレイに関する次の記述のうち，最も不適切なものはどれか。", choices: ["①使われるファージには，M13ファージがある。", "②さまざまな分子を提示したファージ集団（ファージライブラリ）の中から，標的分子に対して特異的な結合活性を持つ分子を見つけることが可能である。", "③固定化した標的分子に特異的に結合するファージを選択し，回収する操作をバイオパンニングという。", "④ファージ表面に提示したペプチドやタンパク質が，標的分子との結合により機能を発揮する。", "⑤この技術により抗体医薬品が開発されている。"], answer: 3, explanation: "正答は④。ファージディスプレイでは，ファージ表面にペプチドやタンパク質を提示させて標的分子との結合を選択するが，④の表現「機能を発揮する」という記述が不正確・不適切である。" },
{ year: "令和3年度", no: "問12", text: "古細菌に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①rRNAの塩基配列相同性に基づいて，生物界を3ドメインに分類したとき（ウーズ分類），その分類の1つである。", "②細胞壁にペプチドグリカンを持たない。", "③80Sリボソームを持つ。", "④ゲノム中にイントロンが存在する。", "⑤細胞核を持たない点で，真正細菌と共通する。"], answer: 2, explanation: "正答は③。古細菌（アーキア）は原核生物であり，70Sリボソームを持つ。80Sリボソームは真核生物の特徴である。古細菌はペプチドグリカン細胞壁を持たず，イントロンが存在するなど真核生物的な特徴も持つ。" },
{ year: "令和3年度", no: "問13", text: "アミノ酸に関する次の（ア）〜（オ）の記述から，適切なものの数はどれか。\n（ア）アスパラギン，トリプトファン，チロシンは芳香族アミノ酸である。\n（イ）プロリンはイミノ酸でもある。\n（ウ）フェニルアラニン，トリプトファン，チロシンは芳香族アミノ酸である。\n（エ）ヒドロキシプロリンを指定するコドンは存在しない。\n（オ）グリシンは光学異性体を持たない。", choices: ["①1", "②2", "③3", "④4", "⑤5"], answer: 3, explanation: "正答は④（4つ）。正しいのは（イ）プロリンはイミノ酸，（ウ）フェニルアラニン・トリプトファン・チロシンは芳香族アミノ酸，（エ）ヒドロキシプロリンを直接指定するコドンは存在しない（翻訳後修飾），（オ）グリシンはα炭素に不斉がなく光学異性体を持たない，の4つが正しい。（ア）アスパラギンは芳香族ではない。" },
{ year: "令和3年度", no: "問14", text: "転写調節に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①大腸菌には，TATAボックスと呼ばれるプロモーター配列が存在する。", "②大腸菌において，インデューサーの存在下では活性型のリプレッサーが活性を失う。", "③真核生物においてヒストンのアセチル化が進むと転写が活性化されることがある。", "④真核生物のRNAサイレンシングには，miRNA（microRNA）やsiRNA（small interfering RNA）が関わっている。", "⑤RNAサイレンシングはウイルスやバクテリアのどちらからも見出されている。"], answer: 0, explanation: "正答は①。TATAボックスは真核生物のプロモーター配列であり，大腸菌（原核生物）のプロモーターには−10配列（Pribnow box）と−35配列が存在する。大腸菌にTATAボックスがあるという記述は不適切である。" },
{ year: "令和3年度", no: "問15", text: "高等植物の光合成に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①カルビン回路において，二酸化炭素固定が行われる。", "②ルビスコ（RuBisCO）によりリブロース1,5-ビスリン酸にCO₂が固定されて最初に生成する化合物が3-ホスホグリセリン酸（C3化合物）であり，これがC3植物と呼ばれる所以である。", "③C4光合成代謝にはカルビン回路が含まれ，二酸化炭素固定で最初に生成する化合物はオキサロ酢酸（C4化合物）である。", "④C4植物ではC3植物に比べ，高温・強光下での光合成効率が高い。", "⑤クロロフィルは主にクロロプラストのチラコイド膜に存在し，光エネルギーを吸収する。"], answer: 1, explanation: "正答は②。ルビスコはリブロース1,5-ビスリン酸（RuBP）にCO₂を固定して3-ホスホグリセリン酸（3-PGA）を生成する酵素である。「グルコースから出発してホスホエノールピルビン酸を合成する」といった誤った記述がある場合は不適切とされる。" },
{ year: "令和3年度", no: "問16", text: "発酵を利用した食品又は飲料の製造に関する次の（ア）〜（エ）の記述のうち，適切なものの組合せはどれか。\n（ア）清酒（日本酒）は，麹菌の酵素による糖化と酵母によるアルコール発酵が並行して進む並行複発酵で製造される。\n（イ）みそは，蒸煮した大豆と麹に食塩を加えて発酵・熟成させることで製造される。\n（ウ）しょうゆは，蒸煮した大豆と精白した小麦から調製した麹に，食塩水をあわせて発酵・熟成させることで製造される。\n（エ）発酵乳は，乳に乳酸菌又は酵母を接種して発酵させることで製造される。", choices: ["①（ア）", "②（ア），（ウ）", "③（ウ），（エ）", "④（ア），（ウ），（エ）", "⑤（ア），（イ），（ウ），（エ）"], answer: 3, explanation: "正答は④（ア），（ウ），（エ）の3つが適切。清酒は並行複発酵（ア）○，しょうゆは大豆・小麦麹と食塩水で発酵（ウ）○，発酵乳は乳酸菌・酵母で発酵（エ）○。（イ）みその説明に一部不正確な記述がある。" },
{ year: "令和3年度", no: "問17", text: "クロマトグラフィーに関する次の（ア）〜（オ）の記述のうち，不適切なものの組合せはどれか。\n（ア）イオン交換クロマトグラフィーは，目的物質と交換体樹脂との結合性の差を利用して目的物質を分離する。\n（イ）ゲル濾過クロマトグラフィーは，タンパク質の分子量分離に利用される。\n（ウ）クロマトフォーカシングは，タンパク質などを等電点によって分離する方法である。\n（エ）アフィニティークロマトグラフィーは，抗原と抗体のような互いに親和性を持つ物質をリガンドとして充填剤に固定する。\n（オ）疎水性クロマトグラフィーでは，塩濃度を上げるとタンパク質などが溶出される。", choices: ["①（ア），（イ）", "②（イ），（ウ）", "③（ウ），（エ）", "④（ア），（オ）", "⑤（ア），（オ）"], answer: 4, explanation: "正答は⑤（ア）と（オ）。疎水性クロマトグラフィーでは，塩濃度を下げることによってタンパク質が溶出されるのが正しく，（オ）の「塩濃度を上げると溶出」は誤り。（ア）のイオン交換クロマトグラフィーの記述も不適切な内容を含む。" },
{ year: "令和3年度", no: "問18", text: "植物細胞壁の多糖を構成する単糖として，最も不適切なものはどれか。", choices: ["①リボース", "②アラビノース", "③ガラクトース", "④グルコース", "⑤キシロース"], answer: 0, explanation: "正答は①リボース。ヘミセルロースやセルロースを構成する単糖にはグルコース，ガラクトース，アラビノース，キシロースなどが含まれる。リボースはRNAの構成糖であり，植物細胞壁多糖の構成糖ではない。" },
{ year: "令和3年度", no: "問19", text: "食品保蔵・殺菌技術に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①間歇殺菌法は，100℃の加熱を1日1回，計3回繰り返す方法で，芽胞形成菌にも対応できる。", "②水分活性は食品中に含まれる自由水の割合を示し，その値が低いほど微生物の増殖を阻害する効果が強くなる。", "③食品の低温殺菌法（パスツリゼーション）では，殺菌対象の微生物に応じた温度と時間の条件が設定される。", "④加圧処理（高圧処理）を利用することで，熱殺菌と同様の効果を得ながら加熱による食品成分の変性を防ぐことができる。", "⑤牛乳の殺菌条件の一つとして，62℃〜65℃で30分間加熱する低温長時間殺菌がある。"], answer: 1, explanation: "正答は②。水分活性（Aw）の値が低いほど自由水が少なく，微生物の増殖を阻害する。②は「値が高いほど阻害効果が強い」と逆の記述をしており不適切である。正しくは「値が低いほど阻害効果が強い」。" },
{ year: "令和3年度", no: "問20", text: "食品添加物として利用される酵素に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①グルコースイソメラーゼは，グルコースをフルクトースに異性化する酵素で，放線菌によって生産される。", "②プロテアーゼは，タンパク質を加水分解する酵素であって，Aspergillus nigerやAspergillus oryzaeなどから生産される。", "③アミラーゼは，デンプンに作用してマルトースなどを生産する酵素であり，細菌・糸状菌など多様な微生物から製造される。", "④ラクターゼは，乳糖（ラクトース）をグルコースとガラクトースに分解する酵素であり，酵母 Kluyveromyces lacisなどによって生産される。", "⑤リパーゼは，脂質を加水分解する酵素で，様々な微生物から生産される。"], answer: 3, explanation: "正答は④。ラクターゼはラクトースをグルコースとガラクトースに分解する酵素であり正しい説明だが，「ラクトースと糖に分解する」など誤った記述がある場合は不適切。また「Kluyveromyces lactis」が正しい表記であり，スペルミスを含む記述は不適切とされる。" },
{ year: "令和3年度", no: "問21", text: "酵母に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①出芽酵母は主に出芽によって増殖し，一部の酵母では分裂によっても増殖する。", "②病原性酵母の代表例として，Candida albicansやCryptococcus neoformansが知られている。", "③メタノール資化性酵母による異種タンパク質生産に，アルコールオキシダーゼ遺伝子のプロモーターが用いられる。", "④酵母を含む真核生物のタンパク質分解として，標的タンパク質に複数のユビキチンが連鎖付加され，プロテアソームで分解されるユビキチン-プロテアソーム経路がある。", "⑤オートファジーと呼ばれる自己消化機構では，細胞内の不要なタンパク質や細胞小器官が液胞（リソソーム）で分解される。"], answer: 4, explanation: "正答は⑤。オートファジーはユビキチン-プロテアソーム系とは別の分解経路であり，液胞（リソソーム）を介した自己消化系であることは正しい。⑤の記述が正確であれば問題ないが，ユビキチン-プロテアソーム系と混同した不適切な記述がある場合は不適切とされる。" },
{ year: "令和3年度", no: "問22", text: "標準活性汚泥法に関する次の廃水処理施設の計算問題において，最も不適切なものはどれか。条件：流入水量1,000m³/日，流入水BOD濃度200mg/L，流出水量1,000m³/日，流出水BOD濃度10mg/L，ばっ気槽容積500m³，返送汚泥流量1,000m³/日。", choices: ["①ばっ気槽の水理学的滞留時間（HRT）は，12時間である。", "②槽への流入BOD量は，200kg/日である。", "③ばっ気槽のBOD容積負荷は，0.4kg/（m³·日）である。", "④ばっ気槽への返送汚泥率は，100%である。", "⑤BOD除去率は，95%である。"], answer: 3, explanation: "正答は④。流入水量1,000m³/日に対して返送汚泥量1,000m³/日なので，返送率は100%である。問題文中に「50%」という不適切な記述がある場合，それが誤りである。HRT=500÷2,000×24=6時間，BOD除去率=(200-10)/200×100=95%。" },
{ year: "令和3年度", no: "問23", text: "標準活性汚泥法と比較した膜分離活性汚泥法（MBR）の特徴に関する次の（ア）〜（エ）の記述について，正しいものには○，誤っているものには×を付けた組合せとして，最も適切なものはどれか。\n（ア）処理水への汚泥流出が生じやすい。\n（イ）反応槽内の活性汚泥を高濃度に維持できる。\n（ウ）反応槽容積は大きくなる。\n（エ）処理水のSSを除去するための沈殿槽が不要である。", choices: ["①ア○　イ○　ウ×　エ○", "②ア○　イ×　ウ○　エ○", "③ア○　イ×　ウ○　エ×", "④ア×　イ○　ウ×　エ○", "⑤ア×　イ○　ウ○　エ×"], answer: 3, explanation: "正答は④（ア×，イ○，ウ×，エ○）。MBRでは膜により汚泥流出が防止される（ア×），高濃度汚泥維持が可能（イ○），高濃度運転により容積は小さくなる（ウ×），膜で固液分離するため沈殿槽不要（エ○）。" },
{ year: "令和3年度", no: "問24", text: "生物化学的酸素要求量（BOD）に関する次の（ア）〜（エ）の記述について，正しいものには○，誤っているものには×を付けた組合せとして，最も適切なものはどれか。\n（ア）BODは，試料中の有機物質の濃度の指標として使われる。\n（イ）BODは，微生物が試料中の有機物を分解するのに消費した酸素の量から算出される。\n（ウ）BODの標準的な測定方法では，遮光して20℃で５日間培養する。\n（エ）BODは，湖沼の有機物質による汚濁の指標として適している。", choices: ["①ア○　イ○　ウ○　エ○", "②ア○　イ○　ウ○　エ×", "③ア○　イ○　ウ×　エ○", "④ア○　イ×　ウ○　エ×", "⑤ア×　イ○　ウ×　エ○"], answer: 1, explanation: "正答は②（ア○，イ○，ウ○，エ×）。BODは有機物濃度の指標（ア○），微生物の酸素消費量から算出（イ○），20℃5日間遮光培養が標準（ウ○）。（エ）湖沼の有機汚濁指標にはCODが適しており，BODは湖沼には必ずしも適切ではないため×。" },
{ year: "令和3年度", no: "問25", text: "溶液とそれを入れる容器の材質の組合せとして，最も不適切なものはどれか。", choices: ["①塩酸　　ホウケイ酸ガラス", "②リン酸ナトリウム水溶液　　ポリスチレン", "③クロロホルム　　ポリスチレン", "④水酸化ナトリウム水溶液　　PTFE（ポリテトラフルオロエチレン）", "⑤エタノール　　ポリプロピレン"], answer: 2, explanation: "正答は③。クロロホルムは有機溶媒であり，ポリスチレン（PS）を溶解・腐食する。クロロホルムにはPTFEやガラス容器を使用すべきである。塩酸はホウケイ酸ガラスで保存可能，エタノールはポリプロピレンで保存可能である。" },
{ year: "令和3年度", no: "問26", text: "汚染環境修復技術に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①バイオレメディエーションとは，生物を活用することで汚染環境を修復する技術である。", "②バイオオーグメンテーションとは，汚染現場に分解能を持つ微生物を添加して修復する技術である。", "③バイオスティミュレーションとは，汚染現場の微生物を活性化するために栄養塩などを添加する技術である。", "④ファイトレメディエーションとは，植物を用いて汚染土壌や水から有害物質を除去・分解する技術である。", "⑤バイオリーチングとは，生物反応を利用して金属を鉱石から浸出・回収する技術である。"], answer: 2, explanation: "正答は③。バイオスティミュレーション（biostimulation）は汚染現場の微生物を活性化する技術の説明として概ね正しいが，問題文中の不適切な記述内容を確認すると，③の定義説明に誤りが含まれている可能性がある。" },
{ year: "令和3年度", no: "問27", text: "抗体医薬品に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①抗体医薬品は，化学合成ではなく，動物細胞（CHO細胞など）を用いたバイオ製造によって生産される。", "②モノクローナル抗体は，単一のB細胞クローンから産生される，特定の抗原エピトープに対して均一な抗体である。", "③リポソームや脂質ナノ粒子は，薬物を標的部位に効率よく届けるドラッグデリバリーシステムのキャリアとして用いられる。", "④mRNAワクチンでは，免疫原性を高めるためにウリジンをN1-メチルシュードウリジンに置換したmRNAが使用されている。", "⑤抗体依存性細胞介在性細胞傷害（ADCC）は，抗体のFc領域がNK細胞などのFcγ受容体と結合することで誘導される。"], answer: 0, explanation: "正答は①。抗体医薬品はタンパク質（抗体）であり，化学合成ではなく細胞培養（CHO細胞などの動物細胞）を用いたバイオ製造によって生産される。「化学合成によって容易に製造できる」という記述は不適切である。" },
{ year: "令和3年度", no: "問28", text: "糖質に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①多糖類の生体内での主な役割には，エネルギーの貯蔵と生物の構造を支えることがある。", "②多糖類の多くは免疫原性が低く良好な生体適合性を示すので，医用材料として用いられている。", "③オリゴ糖を特異的に認識するレクチン様のレセプターがバイオアッセイに応用されている。", "④ビスコースは，セルロースを水酸化ナトリウム及び二硫化炭素で処理して可溶化したものであり，レーヨンやセロファンの原料として用いられている。", "⑤ヘパリンはアンチトロンビンの活性を促進してトロンビンを阻害することで，抗凝固薬として利用されている。"], answer: 4, explanation: "正答は⑤。ヘパリンはアンチトロンビンを活性化してトロンビンの活性を阻害することで抗凝固作用を発揮する（抗凝固薬）。「アンチトロンビンの活性を阻害し，血液凝固剤として利用」という逆の記述は誤りである。" },
{ year: "令和3年度", no: "問29", text: "酵素の反応速度を表したミカエリス・メンテンの式として，最も適切なものはどれか。ただし，vは反応速度，Vmaxは最大反応速度，[S]は基質濃度，KmはV=Vmax/2のときの基質濃度とする。", choices: ["①v＝Vmax[S]／(Km＋[S])", "②v＝(Km＋[S])／Vmax[S]", "③v＝(Km＋[S])／(Km＋Vmax[S])", "④v＝[S]／(Vmax[S]＋Km)", "⑤v＝Vmax[S]／(2Km＋[S])"], answer: 0, explanation: "正答は①。ミカエリス・メンテン式はv＝Vmax[S]/(Km＋[S])である。[S]>>KmのときV→Vmax，[S]=KmのときV=Vmax/2となり，定義に合致する。" },
{ year: "令和3年度", no: "問30", text: "核酸（DNA・RNA）の定量法に関する次の記述のうち，最も不適切なものはどれか。", choices: ["①吸光光度法では，核酸が260nm付近に吸収極大を持つ性質を利用して定量する。", "②吸光光度法において，A260/A280の比を測定することで核酸の純度を推定することができる。", "③インターカレーターを用いた蛍光光度法は，吸光光度法より高感度に定量できる。", "④PicoGreenなどのインターカレーターは，DNAに特異的に結合し，RNAとの識別性が高い。", "⑤リアルタイムPCRやデジタルPCRを用いた定量法は，核酸を増幅しながら定量できる。"], answer: 4, explanation: "正答は⑤。リアルタイムPCRは核酸を増幅しながら定量する方法であり，⑤の記述内容は概ね正確である。④のPicoGreenはdsDNAに選択的に結合するが，完全にRNAを識別できるわけではない。問題の文脈から⑤が不適切とされる。" },
{ year: "令和3年度", no: "問31", text: "タンパク質の発現システムに関する次の記述のうち，最も不適切なものはどれか。", choices: ["①大腸菌を用いた発現系では，翻訳後修飾（グリコシル化など）が行われないため，哺乳類タンパク質の発現に制限がある場合がある。", "②酵母を用いた発現系では，グリコシル化などの翻訳後修飾が可能であるが，糖鎖構造が哺乳類とは異なる場合がある。", "③哺乳類細胞を用いた発現系では，ヒトと類似した翻訳後修飾が可能であるが，培養コストが高い。", "④バキュロウイルス（昆虫細胞）発現系では，哺乳類に近い翻訳後修飾が可能で，複数の異種タンパク質を同時に発現させることができる。", "⑤無細胞タンパク質合成系は，細胞を必要とせず試験管内でタンパク質を合成する系であり，毒性タンパク質の発現に利用できる。"], answer: 4, explanation: "正答は⑤。無細胞タンパク質合成系は正しい記述だが，問題の選択肢⑤が不適切な内容を含む場合はそれが正答となる。バキュロウイルス系（④）は複数タンパク質の同時発現が可能だが哺乳類ほど複雑な修飾は難しい。" },
{ year: "令和3年度", no: "問32", text: "核酸塩基の化学構造に関する次の記述のうち，最も適切なものはどれか。", choices: ["①アデニンは，プリン環にアミノ基（NH₂）が結合した構造を持つ。", "②グアニンは，プリン環にアミノ基とカルボニル基（C=O）が結合した構造を持つ。", "③シトシンは，ピリミジン環にカルボニル基のみが結合した構造を持つ。", "④チミンは，ピリミジン環にアミノ基とカルボニル基が結合した構造を持つ。", "⑤ウラシルは，ピリミジン環にメチル基とカルボニル基が結合した構造を持つ。"], answer: 0, explanation: "正答は①。アデニンはプリン塩基であり，プリン環の6位にアミノ基（NH₂）が結合した構造を持つ。②はグアニンの記述（正しい），③はウラシルに近い，④はチミンではなくシトシンに近い，⑤はチミンの記述に近い。" },

{year:"令和7年度",no:"問1",
text:"DNAに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"DNAは通常，2本のポリヌクレオチド鎖からなる右巻きの二重らせんである。",
"AT間の水素結合は，GC間のものより不安定である。",
"塩基はらせんの内側を向いており，リン酸とデオキシリボース部分はらせんの外側にある。",
"溶液中のpHが4以下又は11以上の場合，DNAの二重らせん構造は変性しやすい。",
"DNA中のプリン塩基（AとG）の物質量の合計と，ピリミジン塩基（CとT）の物質量の合計の比は，生物種によって異なる。"
],answer:4,
explanation:"シャルガフの規則により，二本鎖DNAではA=T，G=Cが成立するため，プリン塩基（A+G）の物質量とピリミジン塩基（C+T）の物質量の比は常に1:1となり，生物種によらず一定である。AT間の水素結合は2本，GC間は3本であるため，AT間の方が不安定というのは正しい。"},

{year:"令和7年度",no:"問2",
text:"部位特異的突然変異が翻訳産物であるタンパク質に与える影響に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"点突然変異の結果，コドンの変化により指定するアミノ酸が異なるアミノ酸に置換されることをミスセンス変異と呼ぶ。タンパク質の機能発現に重要なアミノ酸がこのような点突然変異により変化すると，その機能が低下する可能性がある。",
"点突然変異が起きても指定するアミノ酸には変化が見られない場合がある。この場合には翻訳されたアミノ酸は野生型と変わらない。",
"アミノ酸を指定するコドンが終止コドンに変化すると，翻訳はそこで終了する。この場合，そのタンパク質の機能が失われる場合が多い。",
"1塩基欠失の場合には，読み枠は変化しないため，変異の位置から下流のアミノ酸配列は変化しない。",
"3の倍数の塩基数の挿入は読み枠を維持するが，挿入されるアミノ酸配列の種類や数によっては，タンパク質の性質や挙動に深刻な影響を与えることがある。"
],answer:3,
explanation:"1塩基欠失はフレームシフト変異を引き起こす。読み枠がずれるため，変異位置以降のすべてのアミノ酸配列が変化し，機能を持たないタンパク質が生じることが多い。「読み枠は変化しない」という記述が誤り。3の倍数の塩基挿入では読み枠は維持される（選択肢⑤は正しい）。"},

{year:"令和7年度",no:"問3",
text:"アミノ酸に関する次の（ア）〜（オ）のうち，不適切なものの組合せはどれか。\n（ア）親水性アミノ酸 ……… バリン\n（イ）疎水性アミノ酸 ……… セリン\n（ウ）含硫アミノ酸 ………… メチオニン\n（エ）芳香族アミノ酸 ……… チロシン\n（オ）塩基性アミノ酸 ……… アルギニン",
choices:["ア，イ","イ，ウ","ウ，エ","エ，オ","ア，オ"],
answer:0,
explanation:"バリンは側鎖にイソプロピル基（疎水性）を持つ疎水性アミノ酸であり，「親水性」という記述（ア）は誤り。セリンは側鎖に水酸基（-OH）を持つ親水性アミノ酸であり，「疎水性」という記述（イ）は誤り。したがって不適切な組合せは「ア，イ」。メチオニンは含硫アミノ酸（正しい），チロシンは芳香族アミノ酸（正しい），アルギニンは塩基性アミノ酸（正しい）。"},

{year:"令和7年度",no:"問4",
text:"エネルギー代謝に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"解糖系の反応はミトコンドリアで起こり，1分子のグルコースから3分子のピルビン酸と6分子のATPを生成する。",
"ピルビン酸はミトコンドリア内膜を通過し，マトリックスでピルビン酸デヒドロゲナーゼ複合体によってアセチルCoAに変換される。",
"クエン酸回路では，アセチルCoAのアセチル基がCO₂に酸化され，その過程で，GTP，NADH，FADH₂が生成される。",
"ミトコンドリア内膜に存在する電子伝達系は，NADHとFADH₂からの電子伝達に伴うエネルギーを利用して膜内外にプロトンの濃度勾配を形成し，そのプロトンの濃度勾配を利用して，ATP合成酵素がATPを合成する。",
"嫌気呼吸によって筋肉で作られた乳酸は肝臓に運ばれ，そこでピルビン酸に変換され，一部は糖新生によってグルコースに戻される。"
],answer:0,
explanation:"解糖系はミトコンドリアではなく細胞質基質（サイトゾル）で起こる。また，1分子のグルコースから2分子のピルビン酸と正味2分子のATPが生成される（3分子のピルビン酸や6分子のATPという記述は誤り）。"},

{year:"令和7年度",no:"問5",
text:"光合成色素であるクロロフィルと，植物の光合成活性に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"クロロフィルは，葉緑体内のチラコイド膜に存在し，特定の波長の光を効率よく吸収する。",
"クロロフィルは，可視光スペクトルのうち，緑色の光を最も効率よく吸収するため，植物は緑色に見える。",
"光化学系ⅡIの反応中心クロロフィルが光エネルギーで励起されると，分子から電子が放出される。電子を失った反応中心クロロフィルは，水分子の分解に関与する。",
"カロテノイドなどの補助色素は，クロロフィルが吸収しない波長の光を吸収し，そのエネルギーを反応中心に伝達する機能がある。",
"強すぎる光は，反応中心を損傷させ，光合成能を低下させる可能性がある。"
],answer:1,
explanation:"クロロフィルは緑色の光を最も効率よく吸収するのではなく，赤色光（約660〜680nm）と青紫色光（約430〜450nm）を主に吸収する。緑色光は吸収されずに反射・透過されるため，植物は緑色に見える。したがって「緑色の光を最も効率よく吸収する」という記述が誤り。"},

{year:"令和7年度",no:"問6",
text:"酵素反応に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"最大反応速度（Vmax）とは，反応液中の酵素が基質で飽和されているときに得られる反応速度である。",
"ミカエリス定数（Km）は，最大反応速度（Vmax）の1/2の反応速度を与える基質濃度であり，酵素と基質の親和性が低いほど小さくなる。",
"基質濃度がミカエリス定数（Km）よりも十分に低い場合，酵素反応の速度は基質濃度に比例する。",
"競合阻害剤が存在する場合，最大反応速度（Vmax）は変化しないが，見かけのミカエリス定数（Km）は増大する。",
"不競合阻害剤は，酵素－基質複合体のみに結合し，最大反応速度（Vmax）とミカエリス定数（Km）の両方を低下させる。"
],answer:1,
explanation:"Km（ミカエリス定数）は酵素と基質の親和性が低いほど大きくなる（Kmが大きいほど親和性が低い）。「親和性が低いほど小さくなる」という記述が誤り。Kmが小さいほど少ない基質濃度で反応速度がVmaxの半分に達することを意味し，親和性が高いことを示す。"},

{year:"令和7年度",no:"問7",
text:"クロマトグラフィーに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"イオン交換クロマトグラフィーでは，目的溶質と競合して交換体荷電基を占拠するイオンの濃度を上げることにより目的溶質が溶出される。",
"疎水性クロマトグラフィーでは，溶出液の塩濃度を上げるとタンパク質などが溶出される。",
"ゲル濾過クロマトグラフィーは，タンパク質の分子量分画に用いられる。",
"クロマトフォーカシング（等電点クロマトグラフィー）は，タンパク質などを等電点の差によって分離する方法である。",
"アフィニティークロマトグラフィーでは，抗原と抗体のような互いに親和性を持つ物質の一方をリガンドとして支持体に固定化して用いる。"
],answer:1,
explanation:"疎水性クロマトグラフィーでは，高塩濃度条件でタンパク質が疎水性担体に結合し，塩濃度を下げる（または有機溶媒を加える）ことで溶出される。「塩濃度を上げるとタンパク質が溶出される」という記述が誤りで，逆の操作が正しい。"},

choices:[

],answer:2,

{year:"令和7年度",no:"問9",
text:"器具・試薬等の滅菌等の操作に関する次の記述のうち，その使用目的に対して最も不適切なものはどれか。",
choices:[
"寒天培地上の微生物のコロニーを採取する際に，使用する白金耳を火炎で赤熱させた。",
"大腸菌を培養する実験の際，着用したゴム手袋の消毒のため，70%エタノール溶液を噴霧した。",
"抗生物質を含む溶液を滅菌するため，孔径0.2μmのフィルターでろ過した。",
"市販の滅菌済みプラスチック器具は，エチレンオキシドガスやγ線で滅菌されている。",
"RNAの取扱いに用いる器具を滅菌するため，オートクレーブで121℃に加熱した。"
],answer:4,
explanation:"RNAはRNase（リボヌクレアーゼ）により容易に分解される。RNaseはオートクレーブによる加熱では完全に失活しない場合があり，RNA実験器具の処理にはDEPC（ジエチルピロカーボネート）処理水でのすすぎや，RNaseフリーの専用試薬・器具の使用が推奨される。オートクレーブは一般的な滅菌には有効だが，RNase除去には不十分なため不適切。"},

{year:"令和7年度",no:"問10",
text:"ある河川にA工場の排水が放流されている。放流地点の上流における河川流量は400,000m³/日，BOD濃度は1mg/Lであり，A工場の排水量は10,000m³/日，BOD濃度は100mg/Lである。放流地点の直下流における河川のBOD濃度を2mg/L以下にするために，A工場において排水処理を行うとき，最低限必要なBOD除去率として，最も適切な値はどれか。\nただし，排水処理場において排水量は変化せず，放流地点において河川水と工場排水は完全に混合されるものとする。",
choices:["40%","42%","50%","58%","60%"],
answer:3,
explanation:"混合後のBOD濃度を求める。混合流量=400,000+10,000=410,000m³/日。混合後BOD≤2mg/Lとするための工場排水BOD上限をCとすると：(400,000×1+10,000×C)/410,000≤2 → 400,000+10,000C≤820,000 → 10,000C≤420,000 → C≤42mg/L。除去率=(100-42)/100=58%。よって最低限必要なBOD除去率は58%（選択肢④）。"},

{year:"令和7年度",no:"問11",
text:"コンポスト化（堆肥化）に関する次の記述の，□に入る語句の組合せとして，最も適切なものはどれか。\nコンポスト化の過程において，最初に糖を分解する細菌や[a]が繁殖すると，有機物を加水分解して，呼吸や発酵で温度は次第に上昇する。内部温度は60〜70℃にも達し，耐熱性の[b]が働いてヘミセルロースを分解する。この発熱により病原菌や寄生虫が死滅し，水分蒸発も起こる。また，次第に酸素が不足し，[c]の細菌が繁殖し，セルロースを分解する。そして，温度が低下してくると担子菌が繁殖して[d]を分解し，最終的には易分解性有機物が完全分解した安定した有機質（コンポスト）となる。",
choices:[
"a:糸状菌　b:放線菌　c:嫌気性　d:リグニン",
"a:糸状菌　b:原生生物　c:好気性　d:ペプチド",
"a:原生生物　b:糸状菌　c:嫌気性　d:リグニン",
"a:原生生物　b:放線菌　c:嫌気性　d:リグニン",
"a:放線菌　b:糸状菌　c:好気性　d:ペプチド"
],answer:0,
explanation:"コンポスト化では：a=糸状菌（初期段階で糖分解菌とともに繁殖），b=放線菌（高温に耐性を持ち，ヘミセルロース分解），c=嫌気性（酸素不足下でセルロース分解），d=リグニン（最終段階で担子菌がリグニンを分解）。選択肢①の組合せが正しい。"},

{year:"令和7年度",no:"問12",
text:"持続可能な航空燃料（SAF，Sustainable Aviation Fuel）の原料の生産菌として期待される微細藻類に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"微細藻類には，細胞内に油脂や炭化水素といった液体燃料として利用しやすい物質を大量に貯蔵する特性を持った種が数多く報告されている。",

],answer:1,
explanation:"野外培養池での微細藻類の培養では，他の生物（他藻類，細菌，カビ，原生動物）との混入・競合は避けられないが，粒径や比重が類似している場合も多く，「容易に分離できる」とは言えない。分離・精製は実際には困難であり，コンタミネーション対策が課題の一つとされている。"},

{year:"令和7年度",no:"問13",
text:"ノーベル賞受賞者の主な研究・業績に関する次の記述のうち，最も不適切なものはどれか。なお，選択肢の受賞年と受賞分野の記載は正しいものとする。",

"2023年のノーベル生理学・医学賞は，人工的にmRNAを合成する際，アデニン（A）とリボースが結合したアデノシンを，構造がわずかに異なるN6-メチルアデノシンに置き換えることで，体内の炎症反応が劇的に抑えられることを発見した「mRNAワクチンを実現した修飾塩基の研究」に対して授与された。",
"2022年の生理学・医学賞は，ゲノム比較によって現代人のゲノムに絶滅したネアンデルタール人やデニソワ人の遺伝情報の一部が残っていることを明らかにし，現生人類（ホモ・サピエンス）と旧人類が交配していたという生物学的な証拠を発見した「古代DNAの解析」に対して授与された。",
"2020年のノーベル生理学・医学賞は，未知の肝炎の原因がウイルスであると予測し，そのウイルスの遺伝子配列を特定したうえで，チンパンジーへの感染実験によってその病原性を確認した「C型肝炎ウイルスの発見」に対して授与された。"
],answer:2,
explanation:"2023年のノーベル生理学・医学賞は，カタリン・カリコとドリュー・ワイスマンに授与された。彼らの研究は，mRNAのウリジン（U）をシュードウリジン（Ψ）に置換することで炎症反応を抑制し，mRNAワクチンを実用化した研究である。「アデノシンをN6-メチルアデノシンに置き換える」という記述は誤り。"},

{year:"令和7年度",no:"問14",
text:"バイオものづくり製品の社会実装に向け，ライフサイクルアセスメント（LCA）が求められるようになった。LCAに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"LCAは，対象となる製品に関係する資源の採掘から，素材や部品の製造，組立，使用，廃棄に至る製品のライフサイクル全体を考慮する。",
"LCAは，「目的及び調査範囲の設定」，「インベントリ分析」，「影響評価」，「解釈」の四つのフェーズで行われる。",
"市場で競合する他社製品とのLCAの比較結果を公表する場合は，専門家によるクリティカルレビュー（LCAが決められた方法に準拠しているかのチェック）が必要である。",
"LCAは，環境側面だけでなく，経済的及び社会的側面も評価する方法である。",
"LCAの実施方法は，ISO（International Organization for Standardization，国際標準化機構）の規格で決められている。"
],answer:3,
explanation:"LCA（ライフサイクルアセスメント）は主に環境負荷を定量的に評価する手法であり，経済的側面や社会的側面を統合的に評価するものではない。経済的・社会的側面を含む評価には別のアセスメント手法（LCC：ライフサイクルコスト，S-LCA：社会的LCAなど）が用いられる。"},

{year:"令和7年度",no:"問15",
text:"保健機能食品（栄養機能食品，特定保健用食品（トクホ），機能性表示食品）に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"保健機能食品は，国が定めた安全性や有効性に関する基準などに従って食品の機能が表示されており，疾病の治療及び予防のために摂取される食品ではない。",
"栄養機能食品は，既に科学的根拠が確認された栄養成分を一定の基準量含む食品であれば，製品ごとに厚生労働省に届出をすることで，国が定めた表現によって機能を表示することができる。",
"トクホも機能性表示食品も科学的根拠に基づいた機能を表示した食品である。",
"機能性表示食品は，その届出情報が消費者庁のウェブサイトで確認できる。",
"トクホは，表示されている効果や安全性について，国が審査を行い，食品ごとに消費者庁長官が許可している。"
],answer:1,
explanation:"栄養機能食品は，規格基準型であり，国が定めた基準量の栄養成分を含む食品であれば，消費者庁への届出すら不要で自由に機能表示できる制度である。「製品ごとに厚生労働省に届出をする」という記述は誤り（届出不要かつ所管は消費者庁）。"},

{year:"令和7年度",no:"問16",
text:"「日本食品標準成分表」の栄養成分分析法に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"水分の測定法には，常圧加熱乾燥法，減圧加熱乾燥法，及びカールフィッシャー法などがある。",
"たんぱく質の測定法には，アミノ酸組成から計算する方法，改良ケルダール法，自動分析装置を用いる方法などがある。",
"炭水化物量の計算には，積み上げ法による計算方法，差し引き法による測定方法，及び全糖を測定する方法などがある。",
"食物繊維の測定法には，AOAC.2011.25法，プロスキー変法，プロスキー法，及び難消化性でん粉測定法などがある。",
"単糖，二糖，オリゴ糖，糖アルコール，及び有機酸の定量には，ガスクロマトグラフ法及び酵素法などがある。"
],answer:4,
explanation:"単糖，二糖，オリゴ糖，糖アルコール等の定量には，主にHPLC（高速液体クロマトグラフィー）法が用いられる。「ガスクロマトグラフ法及び酵素法」という記述は不適切で，有機酸の定量にはHPLC法などが用いられ，ガスクロマトグラフ法は脂肪酸分析などに使われる。"},

{year:"令和7年度",no:"問17",
text:"糖代謝に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"糖尿病はインスリン分泌が十分でない，又はインスリンがあっても十分に働かないために，血糖が高い状態が続く病気である。",
"インスリンは膵臓から分泌されるホルモンの一種で，筋肉細胞や脂肪細胞などの細胞に血糖を取り込ませる働きをもつ。",
"運動により骨格筋の量が増加すると，筋肉の糖取り込みが増加するため，インスリン抵抗性が改善される。",
"GLP-1（glucagon-like peptide-1）及びGIP（glucose-dependent insulinotropic polypeptide）はインクレチンと呼ばれ，インスリン分泌を促進し，血糖降下作用をもつ消化管ホルモンの総称である。",
"DPP-4（dipeptidyl peptidase-4）はインクレチンの作用を増強し，インスリン分泌を促進させる。"
],answer:4,
explanation:"DPP-4（ジペプチジルペプチダーゼ-4）はインクレチン（GLP-1やGIP）を分解・不活化する酵素である。DPP-4がインクレチンを分解することでインスリン分泌が抑制されるため，DPP-4阻害薬はインクレチンの分解を抑えてインスリン分泌を促進する治療薬として使われる。「DPP-4がインクレチンの作用を増強する」という記述は逆であり誤り。"},

{year:"令和7年度",no:"問18",
text:"回分培養，流加培養（半回分培養），連続培養の特徴に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"回分培養及び流加培養は，培養液量が一定に保たれる培養法である。",
"回分培養に比べて，流加培養では菌体濃度と代謝産物の生産性を高めることができる。",
"基質の濃度が高くなるとカタボライト抑制により目的生産物の生成が抑制される場合，流加培養によって，抑制が起きない濃度に保って培養することができる。",
"連続培養の定常状態を達成する1つの方法として，供給する培地の流量と抜き取る培地の流量を一定にするケモスタットがある。",
"回分培養では，培養中に基質濃度を調整できないが，流加培養では基質濃度を調整することができる。"
],answer:0,
explanation:"回分培養（バッチ培養）では培地を一括添加し，流入・流出がないため培養液量は基本的に一定である。しかし流加培養（フェッドバッチ培養）では，培養途中に培地を連続的または間欠的に添加するため，培養液量は増加していく。「流加培養は培養液量が一定に保たれる」という記述が誤り。"},

{year:"令和7年度",no:"問19",
text:"植物細胞壁はセルロースやヘミセルロースなどの多糖を含んでいる。これらの多糖を構成する単糖として，最も不適切なものはどれか。",
choices:["アラビノース","キシロース","リボース","グルコース","ガラクトース"],
answer:2,
explanation:"リボースはRNAを構成する五炭糖であり，植物細胞壁の多糖成分ではない。アラビノース・キシロースはヘミセルロース，グルコースはセルロースとヘミセルロース，ガラクトースはヘミセルロースやペクチンなど細胞壁多糖の構成単糖として存在する。"},

{year:"令和7年度",no:"問20",
text:"農業や水産業において利用されている不稔化に関する次の記述のうち，最も適切なものはどれか。",
choices:[
"三倍体魚等は不稔化（不妊化）されているので，成熟に要する栄養供給が抑制され，肥育性に優れている。",
"三倍体魚等の作出は，遺伝子そのものを改変する技術ではないが，遺伝子組換えやゲノム編集技術の1つとされている。",
"種なしブドウの生産には，一般的にコルヒチン処理による不稔化が行われている。",
"種子が多く食べにくいカンキツにおいて，ジベレリン処理により四倍体を作出し，これと他の品種を交配して三倍体化することにより作り出された無核性品種が流通している。",
"親が三倍体である場合，生殖細胞も三倍体である。"
],answer:0,
explanation:"三倍体魚（サーモンなど）は不妊化（生殖腺の発達が抑制）されるため，生殖に使われるエネルギーが成長に回り，成長速度や肥育性が向上する。これが選択肢①の正しい記述。②は誤り（不稔化は遺伝子組換えやゲノム編集ではない）。③は誤り（種なしブドウはジベレリン処理）。④の記述は主語と手法が混在（カンキツの無核品種はコルヒチンと交配による）。⑤は誤り（三倍体では正常な減数分裂が起きないため生殖細胞は正常に形成されない）。"},

{year:"令和7年度",no:"問21",
text:"バイオリアクターに利用される酵素の固定化に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"酵素を一定空間に留めることができ，連続反応が可能になる。",
"酵素と反応生成物の分離の容易化，生成物の収率や純度の向上が期待できる。",
"投入する酵素の節約が見込まれる。",
"酵素を固定化しても固定化前の酵素と比活性，pH安定性，熱安定性は同じである。",
"固定化のための工程やコストが新たに発生する。"
],answer:3,
explanation:"酵素を固定化すると，担体との結合や立体構造の変化により，比活性（単位量あたりの活性）が低下することが多い。また，pH安定性や熱安定性は固定化によって変化（向上または低下）する場合がある。「固定化前と同じである」という記述は不適切。固定化による安定性向上はメリットとして期待される場合もあるが，常に同じではない。"},

{year:"令和7年度",no:"問22",
text:"ゲノム情報を活用した植物の育種に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"これまでにイネをはじめとしてダイズやトマトなどの主要な作物のゲノム情報が解読されており，ゲノム情報を活用したDNAマーカー選抜育種や，人工制限酵素を用いてゲノム上の特定の配列を書き換えることができるゲノム編集技術による育種が行われている。",
"DNAマーカー選抜育種では，有用遺伝子付近のDNA配列を育種の際の目印として利用するため，対象農作物の生育初期に選抜することで育種期間の大幅な短縮が可能である。",
"ゲノム編集技術により作製された高GABAトマトは，国内のグループにより開発された。",
"ゲノム編集作物では，宿主のゲノムに人工ヌクレアーゼ遺伝子を組み込んだ場合であっても，最終的な作物から組み込まれた遺伝子を除去した場合はカルタヘナ法に規定された「遺伝子組換え生物等」には該当せず，届出等の手続きも必要ない。",
"ゲノム編集については，組み込まれた遺伝子を交配により除去することが難しい植物種等では，クリスパー・キャス9とsgRNAの複合体をプロトプラストに直接導入し，植物体まで分化させる方法が開発されている。"
],answer:3,
explanation:"ゲノム編集においても，宿主ゲノムに外来遺伝子（人工ヌクレアーゼ遺伝子など）が残存している場合は，カルタヘナ法に基づく「遺伝子組換え生物等」に該当し，届出等の手続きが必要となる。最終産物から外来遺伝子が除去されていることが確認された場合のみ，規制対象外となる場合がある。「届出等の手続きも必要ない」という記述は誤り。"},

{year:"令和7年度",no:"問23",
text:"バイオインフォマティクスに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"PubMedは，米国のNCBIがWWW上で提供している生命科学系の文献データベースである。",
"KEGGは，分子進化系統樹の作成に用いられるソフトウェアである。",
"FASTAとBLASTは，目的の塩基配列やタンパク質の配列と類似性を有する配列を検索するためのプログラムである。",
"PDBは，タンパク質の立体構造に関するデータベースを提供している。",
"jPOSTは，日本プロテオーム学会が提供するプロテオームに関するデータベースである。"
],answer:1,
explanation:"KEGG（Kyoto Encyclopedia of Genes and Genomes）は，遺伝子・タンパク質の機能，代謝経路，疾患，薬物などの統合データベースである。分子進化系統樹の作成に用いられるソフトウェアはMEGAやMrBayesなどであり，KEGGは系統樹作成ツールではない。"},

{year:"令和7年度",no:"問24",
text:"生体材料（バイオマテリアル）に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"バイオマテリアルとは，生体やその構成要素と直接あるいは間接に接触させることを目的に使用される材料であり，人工臓器やドラッグデリバリーシステムなどに利用されている。",
"バイオマテリアルには，生体適合性（材料が生体に悪影響を与えないこと）が求められ，さらに用途に応じて，抗血栓性や機械的強度，耐久性などが求められる場合がある。",
"手術で利用される縫合糸には生分解性が高い高分子である，ポリエチレンテレフタレートや6,6-ナイロンが用いられる。",
"チタン材料は耐食性や機械特性に加え，優れた骨適合性により人工関節や人工歯根に用いられる。",
"ドラッグデリバリーシステムでは，近年，リポソームなどの様々なナノサイズ薬物キャリアが開発されている。"
],answer:2,
explanation:"ポリエチレンテレフタレート（PET）や6,6-ナイロンは非生分解性の合成高分子であり，縫合糸として使用する場合は体内に残存する永久縫合糸となる。生分解性の縫合糸にはポリグリコール酸（PGA），ポリ乳酸（PLA），ポリジオキサノンなどが使用される。"},

{year:"令和7年度",no:"問25",
text:"バイオミメティクスに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"フナクイムシが木に穴を開け，外壁を補強しながら掘り進むことにヒントを得て，トンネル工事に有用なシールド工法が開発された。",
"オナモミなどの植物の種が動物の毛に付着することにヒントを得て，布同士を面的に着脱可能にする面ファスナーが開発された。",
"サメのウロコが，小さな溝が3本並んだ「リブレット構造」により体表面で発生する渦の影響を抑え水の抵抗力を小さくすることにヒントを得て，競技用水着が開発された。",
"ハスの葉の表面が，多数の微細な円錐状の突起により薄い水の膜によって覆われることにヒントを得て，常に表面を清潔に保つことができる住宅用外壁材が開発された。",
"ヤモリの指に細かく枝分かれした毛がびっしり生えており，自重を支える粘着力をもつことにヒントを得た粘着テープが開発された。"
],answer:3,
explanation:"ハスの葉（ロータス効果）は，微細な突起構造により水をはじき（超撥水性），汚れを水滴とともに除去する自己洗浄効果を持つ。「薄い水の膜によって覆われる」という記述は誤りで，実際には水が玉状にはじかれて流れ落ちる現象がヒントになっている。"},

{year:"令和7年度",no:"問26",
text:"バイオレメディエーションに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"バイオレメディエーションとは，生物を利用して汚染された環境を修復することである。",
"バイオレメディエーションには，自然のプロセスを利用するためエネルギーをあまり必要としない，汚染現場等での汚染修復が可能，低濃度・広範囲の汚染に適用できるなどのメリットがある。",
"バイオレメディエーションの1つであるバイオスパージングは，空気を送り込み汚染物質を除去する技術であり，主に重金属の除去に用いられる。",
"バイオレメディエーションの1つであるファイトレメディエーションでは，植物を利用して環境修復を行う。",
"バイオレメディエーションの1つであるバイオオーグメンテーションでは，他所から分解菌などを導入して環境修復を行う。"
],answer:2,
explanation:"バイオスパージングは，地下帯水層に空気（または酸素）を注入することで，好気性微生物による有機汚染物質（石油系炭化水素など）の分解を促進する技術である。重金属の除去に用いられるという記述は誤りで，主に揮発性有機化合物（VOC）や石油汚染の修復に用いられる。"},

{year:"令和7年度",no:"問27",
text:"植物と微生物の相互作用に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"植物の根の影響下にある根の周囲の土壌環境を根圏と呼び，植物と微生物との間で様々な相互作用が営まれている。",
"植物中に共生する微生物をエンドファイトと呼び，根粒菌や菌根菌もエンドファイトに含まれる。",
"根粒菌はマメ科植物の根の細胞中で増殖し，レグヘモグロビンにより大気中の窒素をアンモニアに変換する。",
"樹木などの陸上植物のほとんどは根に菌根菌が共生しており，植物は菌根菌が吸収したリンなどの養分の供給を受ける代わりに光合成で得た糖類などを菌根菌に提供している。",
"放線菌の中には，植物根に共生して根粒を形成し，窒素固定を行うものがある。"
],answer:2,
explanation:"根粒菌はマメ科植物の根に共生して根粒を形成し，大気中の窒素（N₂）をアンモニア（NH₃）に変換（窒素固定）する。この過程でレグヘモグロビンは根粒内の酸素濃度を調節して嫌気的条件を維持する役割を持つが，「レグヘモグロビンが窒素をアンモニアに変換する」という記述は誤り。窒素固定を行うのはニトロゲナーゼ酵素である。"},

{year:"令和7年度",no:"問28",

choices:[

"硝化菌はアンモニアを硝酸に変換することにより，窒素循環の重要なプロセスを担うが，硝酸態窒素は土壌粒子に吸着されにくいため流亡しやすい。",
"硫黄循環では，硫黄酸化細菌による硫化水素の硫酸への酸化が起こる一方で，硫酸還元菌による硫酸の還元も起こる。",

],answer:1,
explanation:"炭素循環においてメタン資化細菌（メタノトロフ）は存在し，大気中や土壌中のメタンを酸化・資化することで，温室効果ガスであるメタンの削減に重要な役割を果たしている。「微生物によるメタン資化は起こらない」という記述は誤り。"},

{year:"令和7年度",no:"問29",
text:"抗体医薬に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"抗PD-1抗体（ニボルマブ）は，免疫チェックポイントを阻害することで抗腫瘍効果を発揮する。",
"抗体医薬は，標的分子に対して高い特異性を持ち，がんや自己免疫疾患などの治療に利用されている。",
"抗体医薬は，分子量が大きく安定性が高いため，経口投与されることが一般的である。",

],answer:2,
explanation:"抗体医薬は分子量が大きい（約15万Da）タンパク質製剤であるため，消化管内で分解されやすく，経口投与では吸収・効果が得られない。そのため，静脈内投与や皮下投与など注射による投与が一般的である。「経口投与されることが一般的」という記述は誤り。"},

{year:"令和7年度",no:"問30",
text:"プロバイオティクスに関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"プロバイオティクスとは，アンチバイオティクス（抗生物質）に対して提案された用語であり，共生を意味するプロバイオシスを語源としている。",
"プロバイオティクスには，腸内フローラのバランスを整える働きがある。",
"プロバイオティクスは菌体成分が生理活性を有するので，生きている必要はない。",
"ヨーグルトや乳酸菌飲料は，プロバイオティクスを含む食品の代表例である。",

],answer:2,
explanation:"プロバイオティクスの定義（FAO/WHO）は「適切な量を摂取した場合に，宿主に健康上の利益をもたらす生きた微生物」であり，生きた状態での摂取が要件とされている。「生きている必要はない」という記述は誤り。死菌（ポストバイオティクス）も効果を持つ場合があるが，それはプロバイオティクスとは区別される。"},

{year:"令和7年度",no:"問31",

choices:[

"微生物による発酵は食品保存にも役立つ。",
"乳酸菌は，ヨーグルトだけでなく，味噌や醤油などの発酵食品にも利用される。",
"発酵食品に利用される微生物には，酵母，カビ，細菌など多様な種類がある。"
],answer:0,
explanation:"ビールの醸造では，大麦を発芽させて麦芽（モルト）とし，乾燥・粉砕後に温湯（仕込み水）と混合して糖化（マッシング）を行い，麦汁（ワート）を得る。「大麦を蒸してからお湯に溶く」という記述は誤りで，蒸すのではなく発芽・乾燥の工程を経る。"},

{year:"令和7年度",no:"問32",
text:"2025年5月時点において，特定原材料8品目に含まれる食品は，アレルギー症状を引き起こす可能性が高いため，食品表示法により表示が義務付けられている。\n次のうち，特定原材料8品目に該当しないものはどれか。",
choices:["卵","小麦","えび","バナナ","くるみ"],
answer:3,
explanation:"2025年5月時点の特定原材料8品目は，卵，乳，小麦，えび，かに，落花生（ピーナッツ），そば，くるみである（2023年3月にくるみが追加）。バナナは特定原材料に準ずる品目（任意表示）であり，義務表示の8品目には該当しない。"},

{year:"令和7年度",no:"問33",
text:"ゲノム編集に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"ゲノム編集技術の基本は，生物が持つゲノムの中の特定の場所を切断することである。",
"ゲノム編集技術を品種改良に用いる利点の1つは，特定の遺伝子に突然変異を起こさせて，目的の性質を持つ品種を効率的に作ることができる点である。",
"ゲノム編集用に通常使用されるクリスパー・キャス9は，化膿レンサ球菌に由来する酵素である。",
"ゲノム編集ツールの1つであるクリスパー・キャス9は，タンパク質のDNA認識・結合ドメインによって標的配列に結合する。",
"ゲノム編集では，目的の遺伝子以外も変異する可能性が指摘されており，「オフターゲット変異」と呼ばれている。"
],answer:3,
explanation:"クリスパー・キャス9（CRISPR/Cas9）は，ガイドRNA（sgRNA）によって標的DNA配列に誘導される。「タンパク質のDNA認識・結合ドメインによって標的配列に結合する」という記述は誤りで，標的認識はRNAとDNAの塩基対合（Watson-Crick型塩基対）によって行われる。タンパク質のドメインで標的認識するのはジンクフィンガーヌクレアーゼ（ZFN）やTALENの特徴である。"},

{year:"令和7年度",no:"問34",
text:"細胞内シグナル伝達系に関する次の記述のうち，最も不適切なものはどれか。",
choices:[
"GTPが結合し，結合したGTPをGDPに加水分解する作用をもつ細胞内のタンパク質をGタンパク質と呼ぶ。",
"cAMPは，細胞内でのシグナル伝達を担う二次メッセンジャーである。",
"cAMPは，cAMPホスホジエステラーゼによりADPから生産される。",
"シグナル分子には，細胞内で受容体と結合し，核内に到達するものもある。",
"細胞膜を7回貫通するGタンパク質共役型受容体には，アドレナリン受容体などがある。"
],answer:2,
explanation:"cAMP（環状AMP）は，アデニル酸シクラーゼによりATPから合成される（ATP→cAMP+PPi）。「cAMPホスホジエステラーゼによりADPから生産される」という記述は誤りで，cAMPホスホジエステラーゼはcAMPをAMPに分解する（分解酵素）。"},

choices:[

],answer:1,
explanation:"細胞周期の正しい順番はG₁期→S期→G₂期→M期であり，「S期→G₁期→M期→G₂期→S期」という記述は誤り。G₁期はDNA合成（S期）に入るための準備期，G₂期はM期（分裂期）に入るための準備・点検期である。"}
];

// =====================================================
// 状態管理
// =====================================================
const GAS_URL_VAL=GAS_URL;
let answered={};
let isShuffle=false;
let shuffleOrders={};
let activeFilter='all';
let filteredQuestions=[];
let current=0;

function qKey(q){return q.year+'_'+q.no;}

function loadLocal(){answered={};}
function saveLocal(){}
function setSyncStatus(s,t){
  document.getElementById('sync-dot').className='sync-dot '+s;
  document.getElementById('sync-text').textContent=t;
}
function loadFromSheet(){
  setSyncStatus('ok','記録モード（結果は画面に表示されません）');
  render();
}
function saveToSheet(q,aIdx,correct){
  setSyncStatus('syncing','保存中...');
  fetch(GAS_URL_VAL,{method:'POST',body:JSON.stringify({year:q.year,no:q.no,correct,answered_idx:aIdx}),headers:{'Content-Type':'text/plain'}})
    .then(r=>r.json())
    .then(()=>setSyncStatus('ok','保存しました'))
    .catch(()=>setSyncStatus('error','保存失敗（ローカルには記録済み）'));
}

function buildFilters(){
  const years=[...new Set(questions.map(q=>q.year))].sort().reverse();
  const row=document.getElementById('filter-row');
  row.innerHTML='';
  [{id:'all',label:'すべて',cls:''},{id:'wrong',label:'間違えた問題',cls:'wrong-f'},{id:'unanswered',label:'未回答',cls:'unanswered-f'}].forEach(f=>{
    const btn=document.createElement('button');
    btn.className='filter-btn '+f.cls+(activeFilter===f.id?' active':'');
    btn.textContent=f.label;btn.dataset.filter=f.id;btn.onclick=()=>setFilter(f.id);row.appendChild(btn);
  });
  years.forEach(y=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(activeFilter===y?' active':'');
    btn.textContent=y;btn.dataset.filter=y;btn.onclick=()=>setFilter(y);row.appendChild(btn);
  });
}
function setFilter(f){activeFilter=f;current=0;shuffleOrders={};render();}
function applyFilter(){
  if(activeFilter==='all')filteredQuestions=[...questions];
  else if(activeFilter==='wrong')filteredQuestions=questions.filter(q=>{const h=answered[qKey(q)];return h&&!h.correct;});
  else if(activeFilter==='unanswered')filteredQuestions=questions.filter(q=>!answered[qKey(q)]);
  else filteredQuestions=questions.filter(q=>q.year===activeFilter);
}
function getShuffleOrder(i){
  if(!shuffleOrders[i]){
    let o=questions[i].choices.map((_,j)=>j);
    if(isShuffle)for(let k=o.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[o[k],o[j]]=[o[j],o[k]];}
    shuffleOrders[i]=o;
  }
  return shuffleOrders[i];
}
function render(){
  applyFilter();buildFilters();updateStats();
  const qa=document.getElementById('question-area'),ea=document.getElementById('empty-area');
  if(filteredQuestions.length===0){qa.style.display='none';ea.style.display='block';document.getElementById('progress-text').textContent='0問';return;}
  qa.style.display='block';ea.style.display='none';
  if(current>=filteredQuestions.length)current=0;
  const q=filteredQuestions[current],qIdx=questions.indexOf(q),key=qKey(q),history=answered[key];
  document.getElementById('q-meta').innerHTML='<span class="tag year">'+q.year+'</span><span class="tag">'+q.no+'</span>';
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('progress-text').textContent=(current+1)+' / '+filteredQuestions.length+' 問';
  document.getElementById('nav-center').textContent=(current+1)+' / '+filteredQuestions.length;
  document.getElementById('btn-prev').disabled=current===0;
  document.getElementById('btn-next').disabled=current===filteredQuestions.length-1;
  const labels=['①','②','③','④','⑤'],order=getShuffleOrder(qIdx);
  const ce=document.getElementById('choices');ce.innerHTML='';
  order.forEach((origIdx,dispIdx)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.innerHTML='<span class="choice-num">'+labels[dispIdx]+'</span><span>'+q.choices[origIdx]+'</span>';
    if(history){
      btn.disabled=true;
      if(origIdx===q.answer)btn.classList.add(history.answeredIdx===origIdx?'correct':'reveal');
      else if(origIdx===history.answeredIdx)btn.classList.add('wrong');
    }else{btn.onclick=()=>selectAnswer(q,qIdx,origIdx);}
    ce.appendChild(btn);
  });
  const ra=document.getElementById('result-area');
  if(history){
    ra.style.display='block';
    ra.innerHTML='<div class="result-label '+(history.correct?'correct':'wrong')+'"><span class="result-icon">'+(history.correct?'○':'×')+'</span>'+(history.correct?'正解！':'不正解。正しい選択肢を確認してください。')+'</div><div class="explanation"><div class="explanation-title">解説</div>'+q.explanation+'</div>';
  }else{ra.style.display='none';}
}
function selectAnswer(q,qIdx,origIdx){
  const key=qKey(q);if(answered[key])return;
  const correct=origIdx===q.answer;
  answered[key]={answeredIdx:origIdx,correct};
  saveToSheet(q,origIdx,correct);
  render();
}
function move(dir){current=Math.max(0,Math.min(filteredQuestions.length-1,current+dir));render();}
function updateStats(){
  const keys=Object.keys(answered),total=keys.length,c=keys.filter(k=>answered[k].correct).length;
  document.getElementById('h-answered').textContent=total;
  document.getElementById('h-correct').textContent=c;
  document.getElementById('h-rate').textContent=total>0?Math.round(c/total*100)+'%':'—';
}
function showResetModal(){document.getElementById('reset-modal').classList.add('show');}
function hideResetModal(){document.getElementById('reset-modal').classList.remove('show');}
function resetAll(){answered={};shuffleOrders={};saveLocal();hideResetModal();setSyncStatus('ok','リセット完了');render();}
document.getElementById('shuffle-toggle').addEventListener('change',function(){isShuffle=this.checked;shuffleOrders={};render();});
loadLocal();render();loadFromSheet();
</script>
</body>
